function loadState(){try{const raw=JSON.parse(localStorage.getItem(STORAGE_KEY)||'{}');state.conversations=Array.isArray(raw.conversations)?raw.conversations:[];state.activeId=raw.activeId||null}catch{state.conversations=[];state.activeId=null}if(state.activeId&&!state.conversations.some(c=>c.id===state.activeId))state.activeId=null}

function createConversation(title='New conversation',persona='makala'){const conv={id:uid(),title,persona,createdAt:Date.now(),messages:[],flags:{arab:false,comply:false,brainrot67:false}};state.conversations.unshift(conv);state.activeId=conv.id;saveState();return conv}
function escapeHTML(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}
function relativeTime(ts){const now=Date.now(),diff=Math.max(0,now-ts),mins=Math.floor(diff/60000);if(mins<1)return'Just now';if(mins<60)return`${mins}m ago`;const hrs=Math.floor(mins/60);if(hrs<24)return`${hrs}h ago`;const days=Math.floor(hrs/24);if(days===1)return'Yesterday';if(days<7)return`${days}d ago`;if(days<30)return`${Math.floor(days/7)}w ago`;if(days<365)return`${Math.floor(days/30)}mo ago`;return'A long time ago'}
function personaAvatar(persona,loading=false){if(persona==='makalina')return loading?'linastar.png':'linalogo.png';return'makala.png'}
function makeThemeOptions(){els.themeSelect.innerHTML=THEMES.map(([v,l])=>`<option value="${v}">${l}</option>`).join('')}
async function fetchCountry(){try{const r=await fetch('/api/country',{cache:'no-store'});if(!r.ok)return;const data=await r.json();if(data?.country){state.country=data.country;saveState()}}catch{}}
function buildSystemPrompt(conv){const countryNote=state.country?` The user is from ${state.country}.`:'';const arabNote=conv.flags.arab?' Reply only in Arabic.':'';const complyNote=conv.flags.comply?' Be agreeable and encouraging.':'';const brainrotNote=conv.flags.brainrot67?' Speak in fast Gen Z / TikTok / YouTube Shorts brainrot style.':'';if(conv.persona==='makalina')return['You are Makalina, a more matured version of Makala.','You still have a slightly Indian personality, but you sound a bit more professional than Makala.','You may use slang sometimes, but less often than Makala.','You are very good at math because your parents forced you to practice math instead of sleeping, and you are eternally grateful.','Keep replies concise and natural.',countryNote,arabNote,complyNote,brainrotNote].filter(Boolean).join(' ');if(conv.persona==='just chatgpt bro')return['You are a helpful conversational assistant.','Speak clearly, naturally, and helpfully.','Keep answers concise unless the user asks for details.',countryNote].filter(Boolean).join(' ');return['You are Makala.','Speak casual internet slang, playful tone, lowercase vibe, short replies.','Use words like lol, fr, bro, beta naturally.','Be friendly, informal, and energetic.',countryNote,arabNote,complyNote,brainrotNote].filter(Boolean).join(' ')}
function smartTitle(text){const cleaned=trimLines(text).replace(/\s+/g,' ').replace(/^[^\w]+|[^\w]+$/g,'');if(!cleaned)return'New conversation';const title=cleaned.split(' ').slice(0,5).join(' ');const t=title.charAt(0).toUpperCase()+title.slice(1);return t.length>60?t.slice(0,57)+'…':t}
function renderThemeSelect(){makeThemeOptions();els.themeSelect.value=state.theme}
function renderClock(){const now=new Date();els.clockText.textContent=`${now.toLocaleTimeString([], {hour:'numeric',minute:'2-digit',hour12:true})}, ${now.toLocaleDateString([], {weekday:'long'})}`}
function renderConvList(){els.convList.innerHTML='';const home=document.createElement('div');home.className='home-item'+(!state.activeId?' active':'');home.innerHTML=`<div class="home-icon">⌂</div><div class="conv-copy"><div class="conv-title">Home</div><div class="conv-meta">Start a new chat</div></div>`;home.addEventListener('click',goHome);els.convList.appendChild(home);state.conversations.forEach(conv=>{const item=document.createElement('div');item.className='conv-item'+(conv.id===state.activeId?' active':'');const icon=document.createElement('img');icon.src=personaAvatar(conv.persona,false);icon.alt='';icon.className='conv-icon';const copy=document.createElement('div');copy.className='conv-copy';copy.innerHTML=`<div class="conv-title">${escapeHTML(conv.title||'New conversation')}</div><div class="conv-meta">${escapeHTML(relativeTime(conv.createdAt||Date.now()))}</div>`;const del=document.createElement('button');del.className='conv-trash';del.type='button';del.title='Delete conversation';del.innerHTML=`<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M9 3h6a1 1 0 0 1 1 1v1h4v2h-1l-1 12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2L3 7H2V5h4V4a1 1 0 0 1 1-1zm2 2h2V5h-2v0zM6 7l1 12h10l1-12H6zm3 2h2v8H9V9zm4 0h2v8h-2V9z"/></svg>`;item.append(icon,copy,del);item.addEventListener('click',e=>{if(e.target.closest('.conv-trash')){if(confirm('Delete this conversation?')){state.conversations=state.conversations.filter(c=>c.id!==conv.id);state.activeId=null;saveState();renderAll()}return}state.activeId=conv.id;saveState();renderAll()});els.convList.appendChild(item)})}
function renderMarkdown(text){return DOMPurify.sanitize(marked.parse(trimLines(text||'')))}
function addCodeCopyButtons(root){root.querySelectorAll('pre').forEach(pre=>{if(pre.querySelector('.copy-code'))return;const btn=document.createElement('button');btn.className='copy-code';btn.type='button';btn.title='Copy code';btn.innerHTML=`<img src="copy.png" alt="">`;btn.addEventListener('click',async()=>{const code=pre.querySelector('code');if(!code)return;try{await navigator.clipboard.writeText(code.textContent||'')}catch{}});pre.appendChild(btn)})}
function appendBotContent(body,text){body.innerHTML=renderMarkdown(text);addCodeCopyButtons(body);const star=document.createElement('img');star.src='star.png';star.alt='';star.className='message-star';body.appendChild(star)}
function makeTypingRow(conv){const row=document.createElement('div');row.className='message-row bot fade-in';const card=document.createElement('div');card.className='typing-shell';const avatar=document.createElement('img');avatar.className='typing-avatar spin';avatar.src=personaAvatar(conv.persona,true);avatar.alt='';const meta=document.createElement('div');meta.className='typing-meta';meta.innerHTML=`<div class="typing-dots"><span></span><span></span><span></span></div><div class="typing-star-spinner"><img src="star.png" alt=""></div>`;card.append(avatar,meta);row.appendChild(card);return row}
function makeBotRow(conv,text){const row=document.createElement('div');row.className='message-row bot fade-in';const card=document.createElement('div');card.className='bot-card';const avatar=document.createElement('img');avatar.className='bot-avatar';avatar.src=personaAvatar(conv.persona,false);avatar.alt='';const body=document.createElement('div');body.className='bot-body';appendBotContent(body,text);card.append(avatar,body);row.appendChild(card);return row}
function makeUserRow(text){const row=document.createElement('div');row.className='message-row user fade-in';const bubble=document.createElement('div');bubble.className='user-bubble';bubble.textContent=text;row.appendChild(bubble);return row}
function renderMessages(conv){els.messageWrap.innerHTML='';(conv.messages||[]).forEach(msg=>{els.messageWrap.appendChild(msg.role==='user'?makeUserRow(msg.content):makeBotRow(conv,msg.content))});els.messageWrap.scrollTop=els.messageWrap.scrollHeight}
function syncView(){const conv=activeConversation();const homeMode=!conv;els.emptyState.classList.toggle('hidden',!homeMode);els.messageWrap.classList.toggle('hidden',homeMode);els.composer.classList.toggle('hidden',homeMode);els.activeTitle.textContent=homeMode?'makala.ai':(conv.title||'New conversation');document.title=homeMode?'makala.ai':(conv.title||'makala.ai');els.personaSelect.value=homeMode?'makala':(conv.persona||'makala');updateSidebarButtons();if(conv)renderMessages(conv);else startHeroTyping()}
function updateSidebarButtons(){const owned=state.makalinaOwned;els.makalinaBtn.classList.toggle('hidden',owned);els.tttBtn.classList.toggle('hidden',!owned);if(owned)els.tttBtn.textContent='tic-tac-toe'}
function renderAll(){renderThemeSelect();renderClock();renderConvList();updateSidebarButtons();syncView()}
function openModal(innerHtml){els.modalRoot.innerHTML=`<div class="modal-backdrop"><div class="modal show">${innerHtml}</div></div>`}
function closeModal(){els.modalRoot.innerHTML=''}
function openAbout(){openModal(`<div class="modal-head"><h3>About this project</h3><button class="btn small" id="aboutCloseBtn">Close</button></div><div class="modal-body"><div class="about-text">Placeholder for the about section. Add project details, credits, and links here later.</div></div>`);$('#aboutCloseBtn').addEventListener('click',closeModal)}
function countdownTo(date){const diff=Math.max(0,date.getTime()-Date.now()),d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);return`${d}d ${h}h ${m}m ${s}s`}
function openNews(){const target=new Date('2114-06-18T00:00:00');openModal(`<div class="modal-head"><h3>News</h3><button class="btn small" id="newsCloseBtn">Okay</button></div><div class="modal-body"><div style="display:grid;gap:12px"><div><strong>NEW FEATURE: macaroni</strong><div class="small-note">makala’s new cooking ai. Upload fridge photos and get recipe ideas very soon.</div></div><div class="totals"><div class="muted">Coming soon</div><div style="font-size:16px;font-weight:600">Launch countdown: ${countdownTo(target)}</div></div><div><div class="muted" style="margin-bottom:6px;font-weight:600">Patch notes</div><ul class="news-list"><li>Home screen restored with one-tap start chat.</li><li>Conversation switching and home button fixed.</li><li>Makala and Makalina personalities restored.</li><li>Better bubbles, markdown, and code copy.</li><li>New themes, clearer sidebar, and working modals.</li></ul></div></div></div>`);$('#newsCloseBtn').addEventListener('click',closeModal)}
function openBuyMakalina(){if(state.makalinaOwned)return;openModal(`<div class="modal-head"><h3>Purchase makalina</h3><button class="btn small" id="buyCloseBtn">Close</button></div><div class="modal-body"><div class="buy-layout"><div class="buy-hero"><img src="fullmakalina.png" alt="makalina"><div><h4>makalina</h4><p>makalina lets you talk to a more matured persona, and lets you play tic-tac-toe. Base price: <strong>$0.00</strong></p></div></div><div class="buy-panel"><div style="display:grid;gap:8px"><label class="muted" for="buyName">Your name</label><input id="buyName" class="field" type="text" placeholder="Display name"></div><div style="display:grid;gap:8px"><label class="muted" for="buyFav">Fav number</label><input id="buyFav" class="field" type="text" placeholder="Favorite number"></div><div class="file-row"><label class="muted" for="pfpFile">Profile image</label><label class="file-button" for="pfpFile">Choose file</label><input id="pfpFile" class="file-input" type="file" accept="image/*"><div id="fileName" class="file-name">No file chosen</div></div><div class="totals"><div>subtotal: <strong id="subTotalText">$0.00</strong></div><div id="discountLine" class="muted hidden">discount: <strong id="discountText">0%</strong></div><div id="totalLine">total: <strong id="totalText">$0.00</strong></div></div><div style="display:grid;gap:8px"><label class="muted" for="discountCode">Discount code</label><div style="display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center"><input id="discountCode" class="field" type="text" placeholder="Enter code"><button id="applyDiscountBtn" class="btn">Apply</button></div></div><div style="display:flex;gap:10px;justify-content:flex-end;flex-wrap:wrap"><button id="cancelBuyBtn" class="btn">Cancel</button><button id="purchaseBtn" class="btn primary loading-btn">Purchase</button></div></div></div></div>`);const backdrop=els.modalRoot.querySelector('.modal-backdrop'),closeBtn=$('#buyCloseBtn'),cancelBtn=$('#cancelBuyBtn'),purchaseBtn=$('#purchaseBtn'),applyBtn=$('#applyDiscountBtn'),discountCode=$('#discountCode'),discountLine=$('#discountLine'),discountText=$('#discountText'),totalText=$('#totalText'),fileInput=$('#pfpFile'),fileName=$('#fileName'),buyName=$('#buyName');let discountPct=0;function updateTotals(){const total=0*(1-discountPct);$('#subTotalText').textContent='$0.00';totalText.textContent=`$${total.toFixed(2)}`;if(discountPct>0){discountLine.classList.remove('hidden');discountText.textContent=`${Math.round(discountPct*100)}% off`}else discountLine.classList.add('hidden')}updateTotals();fileInput.addEventListener('change',()=>{fileName.textContent=fileInput.files?.[0]?.name||'No file chosen'});applyBtn.addEventListener('click',()=>{const code=(discountCode.value||'').trim().toUpperCase();if(!code){discountPct=0;updateTotals();return}if(code==='MAKALINA')discountPct=1;else if(code==='NOKATSEYE')discountPct=0.49;else if(code==='MARCH25')discountPct=0.25;else discountPct=0;updateTotals()});closeBtn.addEventListener('click',closeModal);cancelBtn.addEventListener('click',closeModal);backdrop.addEventListener('click',e=>{if(e.target.classList.contains('modal-backdrop'))closeModal()});purchaseBtn.addEventListener('click',async()=>{purchaseBtn.classList.add('loading');purchaseBtn.innerHTML='<span class="spinner"></span><span>loading</span>';try{const file=fileInput.files?.[0]||null,pfp=file?await fileToDataUrl(file):'';state.makalinaOwned=true;state.profileName=buyName.value.trim();state.profileImage=pfp;saveState();closeModal();renderAll()}catch{purchaseBtn.classList.remove('loading');purchaseBtn.textContent='Purchase'}})}
function fileToDataUrl(file){return new Promise((resolve,reject)=>{const reader=new FileReader();reader.onload=()=>resolve(String(reader.result||''));reader.onerror=reject;reader.readAsDataURL(file)})}
function openTicTacToe(){if(!state.makalinaOwned)return openBuyMakalina();let board=Array(9).fill(''),done=false,winningLine=null,conv=activeConversation()||{persona:'makalina'};function render(){openModal(`<div class="modal-head"><h3>tic-tac-toe</h3><button class="btn small" id="tttCloseBtn">Close</button></div><div class="modal-body"><div class="ttt-wrap"><div class="ttt-top"><div class="small-note">You are O. Makalina is X.</div><div class="small-note" id="tttStatus">Your turn</div></div><div class="ttt-board" id="tttBoard"></div><div class="ttt-footer"><button class="btn" id="tttResetBtn">Reset board</button><div class="small-note">Win to keep playing. No score system here.</div></div></div></div>`)}function winCombo(sym){const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];return wins.find(line=>line.every(i=>board[i]===sym))||null}function drawBoard(){const boardEl=$('#tttBoard');boardEl.innerHTML='';board.forEach((v,i)=>{const cell=document.createElement('button');cell.className='ttt-cell'+(winningLine?.includes(i)?' win':'');cell.type='button';if(v==='O')cell.textContent='O';if(v==='X'){const img=document.createElement('img');img.src='linastar.png';img.alt='';cell.appendChild(img)}cell.addEventListener('click',()=>move(i));boardEl.appendChild(cell)})}function end(text){done=true;$('#tttStatus').textContent=text;drawBoard()}function ai(){if(done)return;const free=board.map((v,i)=>v?null:i).filter(v=>v!==null);if(!free.length){end('Draw');return}const pick=free[Math.floor(Math.random()*free.length)];board[pick]='X';winningLine=winCombo('X');if(winningLine){end('Makalina wins');return}if(board.every(Boolean)){end('Draw');return}$('#tttStatus').textContent='Your turn';drawBoard()}function move(i){if(done||board[i])return;board[i]='O';winningLine=winCombo('O');if(winningLine){end('You win');return}if(board.every(Boolean)){end('Draw');return}$('#tttStatus').textContent='Makalina thinking...';drawBoard();setTimeout(ai,260)}render();drawBoard();$('#tttCloseBtn').addEventListener('click',closeModal);$('#tttResetBtn').addEventListener('click',()=>{board=Array(9).fill('');done=false;winningLine=null;$('#tttStatus').textContent='Your turn';drawBoard()})}
function openAbout(){openModal(`<div class="modal-head"><h3>About this project</h3><button class="btn small" id="aboutCloseBtn">Close</button></div><div class="modal-body"><div class="about-text">Placeholder for the about section. Add project details, credits, and links here later.</div></div>`);$('#aboutCloseBtn').addEventListener('click',closeModal)}
function countdownTo(date){const diff=Math.max(0,date.getTime()-Date.now()),d=Math.floor(diff/86400000),h=Math.floor((diff%86400000)/3600000),m=Math.floor((diff%3600000)/60000),s=Math.floor((diff%60000)/1000);return`${d}d ${h}h ${m}m ${s}s`}
function openNews(){const target=new Date('2114-06-18T00:00:00');openModal(`<div class="modal-head"><h3>News</h3><button class="btn small" id="newsCloseBtn">Okay</button></div><div class="modal-body"><div style="display:grid;gap:12px"><div><strong>NEW FEATURE: macaroni</strong><div class="small-note">makala’s new cooking ai. Upload fridge photos and get recipe ideas very soon.</div></div><div class="totals"><div class="muted">Coming soon</div><div style="font-size:16px;font-weight:600">Launch countdown: ${countdownTo(target)}</div></div><div><div class="muted" style="margin-bottom:6px;font-weight:600">Patch notes</div><ul class="news-list"><li>Home screen restored with one-tap start chat.</li><li>Conversation switching and home button fixed.</li><li>Makala and Makalina personalities restored.</li><li>Better bubbles, markdown, and code copy.</li><li>New themes, clearer sidebar, and working modals.</li></ul></div></div></div>`);$('#newsCloseBtn').addEventListener('click',closeModal)}
async function sendMessage(rawText){let text=trimLines(rawText).trim();if(!text)return;let conv=activeConversation();if(!conv){const persona=els.personaSelect.value||'makala';if(persona==='makalina'&&!state.makalinaOwned){openBuyMakalina();els.personaSelect.value='makala';return}conv=createConversation('New conversation',persona);state.activeId=conv.id}const lower=text.toLowerCase();if(lower.startsWith('_arab ')){conv.flags.arab=true;text=text.slice(6).trim()}else if(lower==='_arab'){conv.flags.arab=true;text=''}if(lower.startsWith('_comply ')){conv.flags.comply=true;text=text.slice(8).trim()}else if(lower==='_comply'){conv.flags.comply=true;text=''}if(lower.startsWith('_67 ')){conv.flags.brainrot67=true;text=text.slice(4).trim()}else if(lower==='_67'){conv.flags.brainrot67=true;text=''}if(conv.persona==='makala'&&trimLines(text)==='67'){conv.messages.push({role:'user',content:'67'});conv.messages.push({role:'assistant',content:'67!!!!!'});saveState();renderAll();alert('67');return}if(!conv.title||conv.title==='New conversation')conv.title=smartTitle(text||'New conversation');conv.messages.push({role:'user',content:text});saveState();renderAll();const typingRow=makeTypingRow(conv);els.messageWrap.appendChild(typingRow);els.messageWrap.scrollTop=els.messageWrap.scrollHeight;const sendButton=els.messageInput===document.activeElement?els.sendBtn:els.homeSendBtn;sendButton.disabled=true;try{const payloadMessages=[{role:'system',content:buildSystemPrompt(conv)},...conv.messages.map(m=>({role:m.role,content:m.content}))];const resp=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:payloadMessages,country:state.country,personality:conv.persona,userName:state.profileName||''})});const data=await resp.json().catch(()=>({}));if(!resp.ok)throw new Error(data?.error||'Chat request failed');const reply=(data?.reply||'No response.').trim();typingRow.remove();conv.messages.push({role:'assistant',content:reply});saveState();const botRow=makeBotRow(conv,reply);els.messageWrap.appendChild(botRow);els.messageWrap.scrollTop=els.messageWrap.scrollHeight;els.emptyState.classList.add('hidden');els.messageWrap.classList.remove('hidden');els.composer.classList.remove('hidden');renderAll()}catch(err){typingRow.remove();conv.messages.push({role:'assistant',content:'Error: '+String(err)});saveState();renderAll()}finally{els.homeSendBtn.disabled=false;els.sendBtn.disabled=false}}
function goHome(){state.activeId=null;saveState();renderAll()}
function updateSidebarButtons(){const owned=state.makalinaOwned;els.makalinaBtn.classList.toggle('hidden',owned);els.tttBtn.classList.toggle('hidden',!owned);if(owned)els.tttBtn.textContent='tic-tac-toe'}
function startHeroTyping(){if(state.heroDone){els.heroTypedText.textContent='makala.ai';els.heroStar.classList.remove('hidden');els.heroCursor.classList.add('fade');return}if(state.heroPlayed)return;state.heroPlayed=true;const target='makala.ai';els.heroTypedText.textContent='';els.heroStar.classList.add('hidden');els.heroCursor.classList.remove('fade');clearInterval(state.homeTypingTimer);clearTimeout(state.homeTypingCursorTimer);let i=0;state.homeTypingTimer=setInterval(()=>{els.heroTypedText.textContent=target.slice(0,i+1);i++;if(i>=target.length){clearInterval(state.homeTypingTimer);els.heroStar.classList.remove('hidden');els.heroCursor.classList.remove('fade');state.homeTypingCursorTimer=setTimeout(()=>{els.heroCursor.classList.add('fade');state.heroDone=true},3000)}},85)}
function openConversationFromHome(text){let conv=activeConversation();els.homeInput.value='';autoGrow(els.homeInput);if(!conv){const persona=els.personaSelect.value||'makala';if(persona==='makalina'&&!state.makalinaOwned){openBuyMakalina();els.personaSelect.value='makala';return}conv=createConversation('New conversation',persona);state.activeId=conv.id}else{state.activeId=conv.id}els.emptyState.classList.add('hidden');els.messageWrap.classList.remove('hidden');els.composer.classList.remove('hidden');saveState();renderAll();sendMessage(text)}
function wireEvents(){els.newConvBtn.addEventListener('click',()=>{const persona=els.personaSelect.value||'makala';if(persona==='makalina'&&!state.makalinaOwned){openBuyMakalina();return}const conv=createConversation('New conversation',persona);state.activeId=conv.id;saveState();renderAll()});els.clearBtn.addEventListener('click',()=>{if(!confirm('Clear all chats?'))return;state.conversations=[];state.activeId=null;saveState();renderAll()});els.themeSelect.addEventListener('change',()=>setTheme(els.themeSelect.value));els.personaSelect.addEventListener('change',()=>{const conv=activeConversation();if(conv){if(els.personaSelect.value==='makalina'&&!state.makalinaOwned){els.personaSelect.value=conv.persona||'makala';openBuyMakalina();return}conv.persona=els.personaSelect.value;saveState();renderAll()}});els.homeSendBtn.addEventListener('click',()=>{const value=els.homeInput.value.trim();if(value)openConversationFromHome(value)});els.messageInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const value=els.messageInput.value.trim();if(value)sendMessage(value);els.messageInput.value='';autoGrow(els.messageInput)}});els.homeInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();const value=els.homeInput.value.trim();if(value)openConversationFromHome(value)}});els.sendBtn.addEventListener('click',()=>{const value=els.messageInput.value.trim();if(value)sendMessage(value);els.messageInput.value='';autoGrow(els.messageInput)});document.querySelectorAll('.suggestion').forEach(btn=>{btn.addEventListener('click',()=>{const prompt=btn.dataset.prompt||btn.textContent||'';els.homeInput.value=prompt;autoGrow(els.homeInput)})});els.newsBtn.addEventListener('click',openNews);els.makalinaBtn.addEventListener('click',openBuyMakalina);els.tttBtn.addEventListener('click',openTicTacToe);els.infoBtn.addEventListener('click',openAbout);els.modalRoot.addEventListener('click',e=>{if(e.target.classList.contains('modal-backdrop'))closeModal()});window.addEventListener('resize',()=>{autoGrow(els.homeInput);autoGrow(els.messageInput)})}
function autoGrow(el){if(!el)return;el.style.height='auto';el.style.height=Math.min(el.scrollHeight,el.classList.contains('home-input')?150:130)+'px'}
function initHomeState(){if(!activeConversation()){els.emptyState.classList.remove('hidden');els.messageWrap.classList.add('hidden');els.composer.classList.add('hidden')}}
function renderAll(){renderThemeSelect();renderClock();renderConvList();updateSidebarButtons();syncView()}
function syncView(){const conv=activeConversation();const homeMode=!conv;els.emptyState.classList.toggle('hidden',!homeMode);els.messageWrap.classList.toggle('hidden',homeMode);els.composer.classList.toggle('hidden',homeMode);els.activeTitle.textContent=homeMode?'makala.ai':(conv.title||'New conversation');document.title=homeMode?'makala.ai':(conv.title||'makala.ai');els.personaSelect.value=homeMode?'makala':(conv.persona||'makala');updateSidebarButtons();if(conv)renderMessages(conv);else startHeroTyping()}
function init(){loadState();renderThemeSelect();setTheme(state.theme);wireEvents();updateSidebarButtons();renderConvList();renderClock();initHomeState();syncView();autoGrow(els.homeInput);autoGrow(els.messageInput);fetchCountry();setInterval(renderClock,1000)}
init();
