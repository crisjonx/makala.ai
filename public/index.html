<body class="theme-pink">
<div class="app">
  <aside class="sidebar">
    <div class="top-row">
      <strong>Conversations</strong>
      <button id="newConvBtn" class="small-btn plus-btn" type="button" title="New conversation">+</button>
    </div>

    <div class="footer">
      <div id="userCard" class="home-item hidden" style="align-items:center">

        </button>

      </div>
      <button id="clearBtn" class="small-btn clear-btn" type="button">clear chats</button>
    </div>
  </aside>

  <main class="panel">

        <h2 class="hero-title"><span id="heroTypedText" class="typed"></span><span id="heroStar" class="hero-star hidden"><img src="/star.png" alt=""></span><span id="heroCursor" class="hero-cursor"></span></h2>
        <p id="homeSub" class="empty-sub">Simple, fast, and focused.</p>

          <div class="home-row">

            <textarea id="homeInput" class="input" placeholder="Ask me anything..." aria-label="Start chat"></textarea>

          <select id="messageModelSelect" class="model-select" aria-label="model"></select>
          <textarea id="messageInput" class="input" placeholder="Ask me anything..." aria-label="Message"></textarea>
          <button id="sendBtn" class="send-circle" type="button" aria-label="Send"><img src="/send-circle.png" alt="send"></button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="modalRoot"></div>

<script>
const $ = (s, r = document) => r.querySelector(s);
const STORAGE_KEY = 'makala_simple_chat_v2';
const SPLASH_TEXTS = [
  'makala teach me to make the best pani puri, the makala way',
  'whats your life story',
  'will you ever stop talking about Indian food',
  'reasons why makala.ai > chatgpt: 1.free 2. indian (frr) 3. teaches you how to make pani puri',
  'how to hack microslop? 🚫 how do hackers hack microslop? ✅',
  'help me fix my horibal speling',
  '🍛🔥',
  '67 (secret ending)',
  'is dhar mann your dad',
  'where do I live',
  'websites to buy iphone 19 pro max early',
  'makala scores 0% on all ai detectors unintentionally',
  'help me pass history pls',
  'whats your real name'
];
const SUGGESTIONS = [
  'teach me how to make the best Indian curry',
  'best Roblox games frr',
  'write me a funny story',
  'best food oat??'
];
const THEMES = [
  ['pink', 'purple & pink'], ['blue', 'navy blue'], ['red', 'dark red'], ['green', 'dark green'],
  ['minty', 'minty teal'], ['indigo', 'soft indigo'], ['gold', 'gold dusk'], ['rose', 'rose bloom'],
  ['ice', 'ice blue'], ['lime', 'lime pop']
];

marked.setOptions({ gfm: true, breaks: true });

const state = {
  conversations: [],
  activeId: null,
  theme: localStorage.getItem('makala_theme') || 'pink',
  makalinaOwned: localStorage.getItem('makala_makalina_owned') === '1',
  profileName: localStorage.getItem('makala_profile_name') || '',
  profileImage: localStorage.getItem('makala_profile_image') || '',
  heroPlayed: false,
  heroDone: false,
  heroTimer: null,
  heroCursorTimer: null,
  newsTimer: null,
  liveCountdownTimer: null
};

const els = {
  convList: $('#convList'),
  newConvBtn: $('#newConvBtn'),
  newsBtn: $('#newsBtn'),
  makalinaBtn: $('#makalinaBtn'),
  tttBtn: $('#tttBtn'),
  clearBtn: $('#clearBtn'),
  activeTitle: $('#activeTitle'),
  userCard: $('#userCard'),
  userPfp: $('#userPfp'),
  userName: $('#userName'),
  userSub: $('#userSub'),
  homeView: $('#homeView'),
  homeCard: $('#homeCard'),
  homeInput: $('#homeInput'),
  homeSendBtn: $('#homeSendBtn'),
  homeModelSelect: $('#homeModelSelect'),
  homeSub: $('#homeSub'),
  homeStar: $('#heroStar'),
  heroTypedText: $('#heroTypedText'),
  heroCursor: $('#heroCursor'),
  messageWrap: $('#messageWrap'),
  composer: $('#composer'),
  messageInput: $('#messageInput'),
  sendBtn: $('#sendBtn'),
  messageModelSelect: $('#messageModelSelect'),
  suggestions: $('#suggestions'),
  modalRoot: $('#modalRoot')
};

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({ conversations: state.conversations, activeId: state.activeId }));
  localStorage.setItem('makala_theme', state.theme);
  localStorage.setItem('makala_makalina_owned', state.makalinaOwned ? '1' : '0');
  localStorage.setItem('makala_profile_name', state.profileName || '');
  localStorage.setItem('makala_profile_image', state.profileImage || '');
}

function loadState(){
  try{
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    state.conversations = Array.isArray(saved.conversations) ? saved.conversations : [];
    state.activeId = saved.activeId || null;
  }catch{
    state.conversations = [];
    state.activeId = null;
  }
  state.conversations.forEach(c => {
    c.id = c.id || Math.random().toString(36).slice(2, 18);
    c.title = c.title || 'New conversation';
    c.persona = c.persona || 'makala';
    c.createdAt = c.createdAt || Date.now();
    c.updatedAt = c.updatedAt || c.createdAt;
    c.messages = Array.isArray(c.messages) ? c.messages : [];
  });
}

function setTheme(theme){
  state.theme = theme;
  document.body.className = 'theme-' + theme;
  els.homeModelSelect.value = els.messageModelSelect.value = 'makala';
  localStorage.setItem('makala_theme', theme);
}

function personaAvatar(persona){
  return persona === 'makalina' ? '/linalogo.png' : '/makala.png';
}

function activeConversation(){
  return state.conversations.find(c => c.id === state.activeId) || null;
}

function createConversation(title = 'New conversation', persona = 'makala'){
  const conv = { id: Math.random().toString(36).slice(2, 18), title, persona, createdAt: Date.now(), updatedAt: Date.now(), messages: [] };
  state.conversations.unshift(conv);
  state.activeId = conv.id;
  saveState();
  return conv;
}

function formatTime(ts){
  const now = new Date();
  const then = new Date(ts);
  const sameDay = now.toDateString() === then.toDateString();
  if(sameDay){
    const diffMin = Math.floor((Date.now() - ts) / 60000);
    if(diffMin < 1) return 'just now';
    if(diffMin < 60) return diffMin + 'm ago';
  }
  const diffMs = Date.now() - ts;
  const dayMs = 86400000;
  if(diffMs < dayMs * 2) return 'Yesterday';
  if(diffMs < dayMs * 7) return Math.floor(diffMs / dayMs) + 'd ago';
  if(diffMs < dayMs * 30) return Math.floor(diffMs / (dayMs * 7)) + 'w ago';
  if(diffMs < dayMs * 365) return Math.floor(diffMs / (dayMs * 30)) + 'mo ago';
  return 'A long time ago';
}

function smartTitle(text){
  const raw = String(text || '').trim();
  if(!raw) return 'New conversation';
  const clean = raw.replaceAll('\n', ' ').replace(/\s+/g, ' ').replace(/[?!.]+$/g, '');
  const parts = clean.split(' ').slice(0, 5);
  const title = parts.join(' ');
  return title.charAt(0).toUpperCase() + title.slice(1);
}

function renderThemeSelect(){
  const options = THEMES.map(([v, label]) => '<option value="' + v + '">' + label + '</option>').join('');
  els.homeModelSelect.innerHTML = '<option value="makala">makala</option><option value="just chatgpt bro">just chatgpt bro</option><option value="makalina">makalina</option>';
  els.messageModelSelect.innerHTML = els.homeModelSelect.innerHTML;
  els.homeModelSelect.value = 'makala';
  els.messageModelSelect.value = 'makala';
  $('#modalRoot');
  if(!document.getElementById('themeSelect')){
    const s = document.createElement('select');
    s.id = 'themeSelect';
    s.style.display = 'none';
    document.body.appendChild(s);
  }
  const themeSelect = $('#themeSelect');
  themeSelect.innerHTML = options;
  themeSelect.value = state.theme;
  themeSelect.addEventListener('change', () => setTheme(themeSelect.value));
}

function renderSidebarButtons(){
  els.makalinaBtn.classList.toggle('hidden', state.makalinaOwned);
  els.tttBtn.classList.toggle('hidden', !state.makalinaOwned);
}

function renderUserCard(){
  els.userCard.classList.toggle('hidden', !state.makalinaOwned);
  if(state.makalinaOwned){
    els.userPfp.src = '/linalogo.png';
    els.userName.textContent = state.profileName || 'you';
    els.userSub.textContent = 'Makalina owned';
  }
}

function renderConvList(){
  els.convList.innerHTML = '';
  const home = document.createElement('div');
  home.className = 'home-item' + (!state.activeId ? ' active' : '');
  home.innerHTML = '<div class="home-icon">⌂</div><div class="conv-copy"><div class="conv-title">Home</div><div class="conv-meta">Start a new chat</div></div>';
  home.addEventListener('click', goHome);
  els.convList.appendChild(home);

  const chats = [...state.conversations].sort((a, b) => b.updatedAt - a.updatedAt);
  chats.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.id === state.activeId ? ' active' : '');

    const icon = document.createElement('img');
    icon.className = 'conv-icon';
    icon.src = personaAvatar(conv.persona);
    icon.alt = '';

    const copy = document.createElement('div');
    copy.className = 'conv-copy';
    copy.innerHTML = '<div class="conv-title">' + escapeHtml(conv.title || 'New conversation') + '</div><div class="conv-meta">' + escapeHtml(formatTime(conv.updatedAt || Date.now())) + '</div>';

    const del = document.createElement('button');
    del.className = 'conv-trash';
    del.type = 'button';
    del.title = 'Delete conversation';
    del.innerHTML = '<svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M9 3h6a1 1 0 0 1 1 1v1h4v2h-1l-1 12a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2L3 7H2V5h4V4a1 1 0 0 1 1-1zm2 2h2V5h-2v0zM6 7l1 12h10l1-12H6zm3 2h2v8H9V9zm4 0h2v8h-2V9z"/></svg>';

    item.append(icon, copy, del);
    item.addEventListener('click', (e) => {
      if(e.target.closest('.conv-trash')){
        if(confirm('Delete this conversation?')){
          state.conversations = state.conversations.filter(c => c.id !== conv.id);
          state.activeId = null;
          saveState();
          renderAll();
          goHome(true);
        }
        return;
      }
      openConversation(conv.id, true);
    });

    els.convList.appendChild(item);
  });
}

function escapeHtml(s){
  return String(s || '').replace(/[&<>"']/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[m]));
}

function renderMarkdown(text){
  return DOMPurify.sanitize(marked.parse(String(text || '').trim()));
}

function addCodeCopyButtons(root){
  root.querySelectorAll('pre').forEach(pre => {
    if(pre.querySelector('.copy-code')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-code';
    btn.type = 'button';
    btn.title = 'Copy code';
    btn.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16h-9V7h9v14z"/></svg>';
    btn.addEventListener('click', async () => {
      const code = pre.querySelector('code');
      if(!code) return;
      try{ await navigator.clipboard.writeText(code.textContent || ''); }catch{}
    });
    pre.appendChild(btn);
  });
}

function appendBotContent(body, text){
  body.innerHTML = renderMarkdown(text);
  addCodeCopyButtons(body);
  const star = document.createElement('span');
  star.className = 'message-star';
  star.innerHTML = '<img src="/star.png" alt="">';
  body.appendChild(star);
}

function makeTypingRow(conv){
  const row = document.createElement('div');
  row.className = 'message-row bot';
  const card = document.createElement('div');
  card.className = 'typing-wrap';
  const avatar = document.createElement('img');
  avatar.className = 'typing-avatar';
  avatar.src = personaAvatar(conv.persona);
  avatar.alt = '';
  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';
  card.append(avatar, dots);
  row.appendChild(card);
  return row;
}

function makeBotRow(conv, text){
  const row = document.createElement('div');
  row.className = 'message-row bot';
  const card = document.createElement('div');
  card.className = 'bot-card';
  const avatar = document.createElement('img');
  avatar.className = 'bot-avatar';
  avatar.src = personaAvatar(conv.persona);
  avatar.alt = '';
  const wrap = document.createElement('div');
  wrap.style.position = 'relative';
  const tools = document.createElement('div');
  tools.className = 'tools';
  tools.innerHTML = '<button class="tool-btn" type="button" title="Copy"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M16 1H6a2 2 0 0 0-2 2v12h2V3h10V1zm3 4H10a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h9a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2zm0 16h-9V7h9v14z"/></svg></button><button class="tool-btn" type="button" title="Reply"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M10 9V5l-7 7 7 7v-4.1c4.5 0 7.6 1.5 10 4.1-1-6-4-12-10-14z"/></svg></button>';
  const body = document.createElement('div');
  body.className = 'bot-body';
  appendBotContent(body, text);
  wrap.append(tools, body);
  card.append(avatar, wrap);
  row.appendChild(card);

  const [copyBtn, replyBtn] = tools.querySelectorAll('button');
  copyBtn.addEventListener('click', async () => {
    try{ await navigator.clipboard.writeText(text || ''); }catch{}
  });
  replyBtn.addEventListener('click', () => {
    els.messageInput.value = '> ' + String(text || '').replaceAll('\n', '\n> ') + '\n\n';
    autoGrow(els.messageInput);
    els.messageInput.focus();
  });
  return row;
}

function makeUserRow(text){
  const row = document.createElement('div');
  row.className = 'message-row user';
  const bubble = document.createElement('div');
  bubble.className = 'user-bubble';
  bubble.innerHTML = renderMarkdown(text);
  row.appendChild(bubble);
  return row;
}

function renderMessages(conv){
  els.messageWrap.innerHTML = '';
  (conv.messages || []).forEach(msg => {
    els.messageWrap.appendChild(msg.role === 'user' ? makeUserRow(msg.content) : makeBotRow(conv, msg.content));
  });
  els.messageWrap.scrollTop = els.messageWrap.scrollHeight;
}

function updateView(){
  const conv = activeConversation();
  const homeMode = !conv;
  els.homeView.classList.toggle('hidden', !homeMode);
  els.messageWrap.classList.toggle('hidden', homeMode);
  els.composer.classList.toggle('hidden', homeMode);
  els.activeTitle.textContent = homeMode ? 'makala.ai' : (conv.title || 'New conversation');
  document.title = homeMode ? 'makala.ai' : (conv.title || 'makala.ai');
  els.homeCard.classList.add('ready');
  els.homeModelSelect.value = conv ? conv.persona : 'makala';
  els.messageModelSelect.value = conv ? conv.persona : 'makala';
  if(conv){ renderMessages(conv); }
}

function renderHomeSuggestions(){
  els.suggestions.innerHTML = '';
  SUGGESTIONS.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'suggestion';
    btn.type = 'button';
    btn.textContent = text;
    btn.addEventListener('click', () => {
      els.homeInput.value = text;
      autoGrow(els.homeInput);
      els.homeInput.focus();
    });
    els.suggestions.appendChild(btn);
  });
}

function startHeroTyping(force = false){
  if(state.heroPlayed && !force) return;
  els.homeCard.classList.add('ready');
  els.homeSub.textContent = SPLASH_TEXTS[Math.floor(Math.random() * SPLASH_TEXTS.length)];
  const target = 'makala.ai';
  els.heroTypedText.textContent = '';
  els.homeStar.classList.add('hidden');
  els.heroCursor.classList.remove('fade');
  clearInterval(state.heroTimer);
  clearTimeout(state.heroCursorTimer);
  let i = 0;
  state.heroTimer = setInterval(() => {
    els.heroTypedText.textContent = target.slice(0, i + 1);
    i++;
    if(i >= target.length){
      clearInterval(state.heroTimer);
      els.homeStar.classList.remove('hidden');
      state.heroDone = true;
      state.heroPlayed = true;
      state.heroCursorTimer = setTimeout(() => {
        els.heroCursor.classList.add('fade');
      }, 3000);
    }
  }, 85);
  if(els.suggestions.childElementCount === 0) renderHomeSuggestions();
}

function goHome(replace = false){
  state.activeId = null;
  saveState();
  updateView();
  if(replace) history.replaceState({}, '', '/');
  else history.pushState({}, '', '/');
  startHeroTyping(true);
}

function openConversation(id, push = true){
  const conv = state.conversations.find(c => c.id === id);
  if(!conv){ goHome(true); return; }
  state.activeId = id;
  saveState();
  renderConvList();
  updateView();
  if(push) history.pushState({ id }, '', '/c/' + id);
  els.homeInput.value = '';
  els.messageInput.value = '';
  autoGrow(els.homeInput);
  autoGrow(els.messageInput);
}

function autoGrow(el){
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 140) + 'px';
}

function openBuyModal(){
  openModal(`

          <div style="display:flex;gap:10px;justify-content:flex-end"><button id="cancelBuyBtn" class="small-btn" type="button">Cancel</button><button id="purchaseBtn" class="small-btn primary loading-btn" type="button">Purchase</button></div>

  const discountLine = $('#discountLine');
  const discountText = $('#discountText');
  const totalText = $('#totalText');

  const fileName = $('#fileName');

  let discount = 0;

  function updateTotals(){
    discountLine.classList.toggle('hidden', discount <= 0);

  fileInput.addEventListener('change', () => {
    fileName.textContent = fileInput.files && fileInput.files[0] ? fileInput.files[0].name : 'No file chosen';
  });

  applyDiscountBtn.addEventListener('click', () => {
    const code = String(discountCode.value || '').trim().toUpperCase();
    if(code === 'MAKALINA') discount = 1;

    else if(code === 'MARCH25') discount = 0.25;
    else discount = 0;

  function close(){ closeModal(); }

function fileToDataUrl(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ''));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function openNews(){
  const target = new Date('2114-06-18T00:00:00');
  openModal(`
    <div class="modal-head"><h3>News</h3><button class="small-btn" id="newsCloseBtn" type="button">Okay</button></div>
    <div class="modal-body">
      <div style="display:grid;gap:12px">
        <div><strong>NEW FEATURE: macaroni</strong><div class="footer-note">makala’s new cooking ai. Upload fridge photos and get recipe ideas very soon.</div></div>
        <div class="totals"><div class="muted">Coming soon</div><div>Launch countdown: <strong id="countdownLive">${countdownTo(target)}</strong></div></div>
        <div><div class="muted" style="margin-bottom:6px;font-weight:600">Patch notes</div><ul style="display:grid;gap:8px;margin:0;padding-left:18px"><li>Home screen restored.</li><li>Conversation switching fixed.</li><li>Makala and Makalina personalities restored.</li><li>Markdown and code copy are working again.</li><li>More themes and cleaner layout.</li></ul></div>
      </div>
    </div>
  `);
  const countdownEl = $('#countdownLive');
  if(state.liveCountdownTimer) clearInterval(state.liveCountdownTimer);
  state.liveCountdownTimer = setInterval(() => {

  }, 1000);
  $('#newsCloseBtn').addEventListener('click', closeModal);

function countdownTo(date){
  const diff = Math.max(0, date.getTime() - Date.now());
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  return d + 'd ' + h + 'h ' + m + 'm ' + s + 's';
}

function openModal(html){
  els.modalRoot.innerHTML = '<div class="modal-backdrop"><div class="modal">' + html + '</div></div>';
}

function closeModal(){
  if(state.liveCountdownTimer){ clearInterval(state.liveCountdownTimer); state.liveCountdownTimer = null; }
  els.modalRoot.innerHTML = '';
}

function openTtt(){
  if(!state.makalinaOwned) return;
  openModal(`
    <div class="modal-head"><h3>tic-tac-toe</h3><button class="small-btn" id="tttCloseBtn" type="button">Close</button></div>
    <div class="modal-body"><div class="footer-note">This can be added back cleanly next.</div></div>
  `);
  $('#tttCloseBtn').addEventListener('click', closeModal);
}

function openConversationFromHome(text){
  let conv = activeConversation();
  const persona = els.homeModelSelect.value || 'makala';
  if(persona === 'makalina' && !state.makalinaOwned){ openBuyModal(); return; }
  if(!conv){ conv = createConversation('New conversation', persona); }
  els.homeInput.value = '';
  autoGrow(els.homeInput);
  saveState();
  openConversation(conv.id, true);
  sendMessage(text, conv);
}

async function sendMessage(rawText, existingConv = null){
  let text = String(rawText || '').trim();
  if(!text) return;

  let conv = existingConv || activeConversation();
  if(!conv){
    const persona = els.messageModelSelect.value || 'makala';
    if(persona === 'makalina' && !state.makalinaOwned){ openBuyModal(); return; }
    conv = createConversation('New conversation', persona);
    state.activeId = conv.id;
  }

  if(!conv.title || conv.title === 'New conversation') conv.title = smartTitle(text);
  conv.messages.push({ role: 'user', content: text });
  conv.updatedAt = Date.now();
  saveState();
  renderConvList();
  renderMessages(conv);

  const typingRow = makeTypingRow(conv);
  els.messageWrap.appendChild(typingRow);
  els.messageWrap.scrollTop = els.messageWrap.scrollHeight;
  els.sendBtn.disabled = true;
  els.homeSendBtn.disabled = true;

  try{
    const payload = {
      messages: [
        { role: 'system', content: 'You are Makala. Reply casually and keep answers concise.' },
        ...conv.messages
      ],
      model: conv.persona || 'makala'
    };
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    const data = await resp.json().catch(() => ({}));
    if(!resp.ok) throw new Error(data && data.error ? data.error : 'Chat request failed');
    const reply = String(data.reply || 'No response.');
    typingRow.remove();
    conv.messages.push({ role: 'assistant', content: reply });
    conv.updatedAt = Date.now();
    saveState();
    renderConvList();
    renderMessages(conv);
    els.messageWrap.scrollTop = els.messageWrap.scrollHeight;
  }catch(err){
    typingRow.remove();
    conv.messages.push({ role: 'assistant', content: 'Error: ' + String(err) });
    conv.updatedAt = Date.now();
    saveState();
    renderConvList();
    renderMessages(conv);
  }finally{
    els.sendBtn.disabled = false;
    els.homeSendBtn.disabled = false;
    els.messageInput.value = '';
    els.homeInput.value = '';
    autoGrow(els.messageInput);
    autoGrow(els.homeInput);
  }
}

function clearChats(){
  if(!confirm('Clear all chats?')) return;
  state.conversations = [];
  state.activeId = null;
  saveState();
  renderAll();
  goHome(true);
}

function renderAll(){
  renderSidebarButtons();
  renderUserCard();
  renderConvList();
  updateView();
}

function wireEvents(){
  els.newConvBtn.addEventListener('click', () => {
    const persona = els.homeModelSelect.value || 'makala';
    if(persona === 'makalina' && !state.makalinaOwned){ openBuyModal(); return; }
    const conv = createConversation('New conversation', persona);
    state.activeId = conv.id;
    saveState();
    openConversation(conv.id, true);
    els.homeInput.value = '';
    autoGrow(els.homeInput);
  });
  els.newsBtn.addEventListener('click', openNews);
  els.makalinaBtn.addEventListener('click', openBuyModal);
  els.tttBtn.addEventListener('click', openTtt);
  els.clearBtn.addEventListener('click', clearChats);
  els.homeSendBtn.addEventListener('click', () => { const v = els.homeInput.value.trim(); if(v) openConversationFromHome(v); });
  els.sendBtn.addEventListener('click', () => { const v = els.messageInput.value.trim(); if(v) sendMessage(v); });
  els.homeInput.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); const v = els.homeInput.value.trim(); if(v) openConversationFromHome(v); } });
  els.messageInput.addEventListener('keydown', e => { if(e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); const v = els.messageInput.value.trim(); if(v) sendMessage(v); } });
  els.homeInput.addEventListener('input', () => autoGrow(els.homeInput));
  els.messageInput.addEventListener('input', () => autoGrow(els.messageInput));
  els.homeModelSelect.addEventListener('change', () => { els.messageModelSelect.value = els.homeModelSelect.value; });
  els.messageModelSelect.addEventListener('change', () => { els.homeModelSelect.value = els.messageModelSelect.value; });
}

function initHome(){
  if(state.heroPlayed){
    els.heroTypedText.textContent = 'makala.ai';
    els.homeStar.classList.remove('hidden');
    els.heroCursor.classList.add('fade');
    renderHomeSuggestions();
    return;
  }
  els.homeCard.classList.add('ready');
  els.homeSub.textContent = SPLASH_TEXTS[Math.floor(Math.random() * SPLASH_TEXTS.length)];
  renderHomeSuggestions();
  const target = 'makala.ai';
  let i = 0;
  els.heroTypedText.textContent = '';
  els.homeStar.classList.add('hidden');
  els.heroCursor.classList.remove('fade');
  state.heroTimer = setInterval(() => {
    els.heroTypedText.textContent = target.slice(0, i + 1);
    i++;
    if(i >= target.length){
      clearInterval(state.heroTimer);
      els.homeStar.classList.remove('hidden');
      state.heroPlayed = true;
      state.heroDone = true;
      state.heroCursorTimer = setTimeout(() => { els.heroCursor.classList.add('fade'); }, 3000);
    }
  }, 85);
}

function escapeInputBox(){
  els.messageInput.value = '';
  els.homeInput.value = '';
  autoGrow(els.messageInput);
  autoGrow(els.homeInput);
}

function init(){
  loadState();
  setTheme(state.theme);
  renderThemeSelect();
  wireEvents();
  renderSidebarButtons();
  renderUserCard();
  renderConvList();
  if(!state.activeId){
    updateView();
    initHome();
  }else{
    openConversation(state.activeId, false);
  }
  document.body.classList.add('loaded');
  const themeSelect = document.createElement('select');
  themeSelect.id = 'themeSelect';
  themeSelect.style.display = 'none';
  document.body.appendChild(themeSelect);
  themeSelect.innerHTML = THEMES.map(([v,l]) => '<option value="' + v + '">' + l + '</option>').join('');
  themeSelect.value = state.theme;
  themeSelect.addEventListener('change', () => setTheme(themeSelect.value));
}

init();
</script>
