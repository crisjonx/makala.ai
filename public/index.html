function buildSystemPrompt(conv){const countryNote=state.country?` The user is from ${state.country}.`:'';const arabNote=conv.flags.arab?' Reply only in Arabic.':'';const complyNote=conv.flags.comply?' Be agreeable and encouraging.':'';if(conv.persona==='makalina')return['You are makalina, a more matured version of Makala.','You still have a slightly Indian personality, but you sound a bit more professional than Makala.','You may use slang sometimes, but less often than Makala.','You are very good at math because your parents forced you to practice math instead of sleeping, and you are eternally grateful.','Keep replies concise and natural.',countryNote,arabNote,complyNote].filter(Boolean).join(' ');if(conv.persona==='just chatgpt bro')return['You are a helpful conversational assistant.','Speak clearly, naturally, and helpfully.','Keep answers concise unless the user asks for details.',countryNote].filter(Boolean).join(' ');return['You are Makala.','Speak casual internet slang, playful tone, lowercase vibe, short replies.','Use words like lol, fr, bro, beta naturally.','Be friendly, informal, and energetic.',countryNote,arabNote,complyNote].filter(Boolean).join(' ')}
function openConversationFromHome(text){let conv=activeConversation();const persona=els.homeModelSelect.value||'makala';if(persona==='makalina'&&!state.makalinaOwned){openBuyMakalina();return}if(!conv){conv=createConversation('New conversation',persona);state.activeId=conv.id}els.homeInput.value='';autoGrow(els.homeInput);saveState();openConversation(conv.id,true);sendMessage(text,conv)}
function openConversation(id,push=true){const conv=state.conversations.find(c=>c.id===id);if(!conv){goHome(true);return}state.activeId=id;els.activeTitle.textContent=conv.title||'New conversation';document.title=conv.title||'makala.ai';els.homeModelSelect.value=conv.persona||'makala';els.messageModelSelect.value=conv.persona||'makala';els.emptyState.classList.add('hidden');els.messageWrap.classList.remove('hidden');els.composer.classList.remove('hidden');renderConvList();renderMessages(conv);if(push)history.pushState({id},'',`/c/${id}`);saveState();renderSidebarButtons();renderUserCard()}
function initHome(){if(state.heroPlayed){els.heroTypedText.textContent='makala.ai';els.heroStar.classList.remove('hidden');renderHomeSuggestions();return}els.homeCard.classList.add('ready');els.heroSub.textContent=SPLASH_TEXTS[Math.floor(Math.random()*SPLASH_TEXTS.length)];const target='makala.ai';els.heroTypedText.textContent='';els.heroStar.classList.add('hidden');clearInterval(state.heroTimer);clearTimeout(state.heroCursorTimer);let i=0;state.heroTimer=setInterval(()=>{els.heroTypedText.textContent=target.slice(0,i+1);i++;if(i>=target.length){clearInterval(state.heroTimer);els.heroStar.classList.remove('hidden');state.heroPlayed=true;state.heroDone=true}},85);renderHomeSuggestions()}
function init(){loadState();renderThemeSelect();setTheme(state.theme);wireEvents();renderSidebarButtons();renderUserCard();renderConvList();renderHomeSuggestions();document.body.classList.add('loaded');fetchCountry?.();renderHomeFromSaved();renderAll();initHome();setInterval(()=>renderConvList(),60000)}
init();
</script>
