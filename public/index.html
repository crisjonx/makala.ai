<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>makala.ai</title>
<link id="favicon" rel="icon" href="/makala.ico" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<!-- markdown + sanitize + katex (optional) -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>

<style>
  /* ---------- base & theme variables ---------- */
  *{box-sizing:border-box}
  :root{
    --font: "Inter", system-ui, -apple-system, "Segoe UI", Roboto, Arial;
    --bg1:#0a0015; --bg2:#1b001f;
    --accent-a:#ff49a0; --accent-b:#ff7fcf;
    --muted:#b9a9b7;
    --user-a:#200023; --user-b:#0b0012;
    --bot-bg: rgba(255,255,255,0.03);
    --ui-radius:12px;
  }
  html,body{height:100%;margin:0;font-family:var(--font);color:#fff;overflow-x:hidden;background:linear-gradient(180deg,var(--bg1),var(--bg2));-webkit-font-smoothing:antialiased}
  body{display:flex;align-items:center;justify-content:center;padding:24px;transition:background .28s ease}
  .app{width:980px;max-width:calc(100% - 40px);height:720px;display:grid;grid-template-columns:240px 1fr;gap:18px;align-items:start}

  /* themes */
  body.theme-pink{ --bg1:#0a0015;--bg2:#1b001f;--accent-a:#ff49a0;--accent-b:#ff7fcf;--user-a:#200023;--user-b:#0b0012;--bot-bg:rgba(255,255,255,0.03)}
  body.theme-deep{ --bg1:#020202;--bg2:#000;--accent-a:#ff007f;--accent-b:#ff4fb1;--user-a:#0b0b0b;--user-b:#000000;--bot-bg:rgba(255,255,255,0.02)}
  body.theme-soft{ --bg1:#0b0710;--bg2:#1b1128;--accent-a:#b98cff;--accent-b:#8fb7ff;--user-a:#161023;--user-b:#0b0620;--bot-bg:rgba(255,255,255,0.035)}
  body.theme-blue{ --bg1:#041025;--bg2:#061b2f;--accent-a:#2ea6ff;--accent-b:#7ecbff;--user-a:#042033;--user-b:#001426;--bot-bg:rgba(255,255,255,0.02)}
  body.theme-orange{ --bg1:#130800;--bg2:#2a0f00;--accent-a:#ff9a3c;--accent-b:#ff5a1f;--user-a:#2b0f00;--user-b:#1a0700;--bot-bg:rgba(255,255,255,0.02)}
  body.theme-red{ --bg1:#1a0707;--bg2:#2b0909;--accent-a:#ff4b4b;--accent-b:#ff8181;--user-a:#220808;--user-b:#140404;--bot-bg:rgba(255,255,255,0.02)}
  body.theme-green{ --bg1:#02120a;--bg2:#072014;--accent-a:#3cff9a;--accent-b:#7cffb1;--user-a:#062014;--user-b:#03130b;--bot-bg:rgba(255,255,255,0.02)}
  .panel, .sidebar, .messages-wrap, textarea.input, .field { transition: all .18s ease; }

  /* sidebar */
  .sidebar{background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));border-radius:var(--ui-radius);padding:12px;height:100%;box-shadow:0 12px 30px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.03);display:flex;flex-direction:column}
  header.sidebar-h{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .makalina-img { width:44px; height:44px; border-radius:8px; overflow:hidden; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; border:0; background:transparent; padding:0; }
  .makalina-img img{ width:100%; height:100%; object-fit:contain; display:block; }
  .new-btn{ margin-left:auto; background:transparent; color:var(--muted); border:1px solid rgba(255,255,255,0.04); padding:6px 8px; border-radius:8px; cursor:pointer}
  .conv-list{flex:1;overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:6px}
  .conv{display:flex;align-items:center;gap:8px;padding:8px;border-radius:10px;cursor:pointer;color:var(--muted);transition:background .12s}
  .conv.active{background:linear-gradient(90deg, rgba(255,255,255,0.015), rgba(255,255,255,0.01));color:#fff;box-shadow:0 6px 20px rgba(0,0,0,0.4)}
  .conv-meta{font-size:12px;color:var(--muted)}
  .conv .trash { margin-left:auto; width:18px;height:18px;opacity:.9;cursor:pointer; filter: invert(1) brightness(2); } /* make trash white */
  .sidebar-note{font-size:12px;color:var(--muted);margin-top:8px}

  /* main panel */
  .panel{background:linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0.006));border-radius:var(--ui-radius);padding:12px;height:100%;display:flex;flex-direction:column;box-shadow:0 12px 30px rgba(0,0,0,0.6);border:1px solid rgba(255,255,255,0.03);overflow:hidden}
  .header{display:flex;align-items:center;gap:12px;padding:6px 8px;border-bottom:1px solid rgba(255,255,255,0.03)}
  .brand{display:flex;align-items:center;gap:10px}
  .brand img{width:28px;height:28px;border-radius:6px;transition:transform .18s}
  .brand h1{margin:0;font-size:16px;font-weight:600;color:#fff}
  .header-right{margin-left:auto;display:flex;gap:8px;align-items:center}

  .user-info{display:flex;align-items:center;gap:8px;margin-left:12px}
  .pfp{width:32px;height:32px;border-radius:50%;overflow:hidden;border:1px solid rgba(255,255,255,0.04)}
  .pfp img{width:100%;height:100%;object-fit:cover}
  .coins{display:inline-flex;align-items:center;gap:6px;color:var(--muted);font-size:13px}
  .spin{animation:spin 6s linear infinite}
  @keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

  /* messages area */
  .messages-wrap{flex:1;overflow:auto;padding:12px 14px;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth;overflow-x:hidden}
  /* Bot (label + body) */
  .bot-card{max-width:78%;display:flex;flex-direction:column;gap:4px;align-items:flex-start;width:100%}
  .bot-meta{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px}
  .bot-meta img{width:18px;height:18px;border-radius:6px}
  .bot-label{font-weight:600;color:#fff;font-size:13px;display:inline-flex;align-items:center;gap:8px}
  .meta-copy{width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;padding:3px;border-radius:6px;background:rgba(255,255,255,0.03);cursor:pointer;transition:transform .12s}
  .meta-copy img{width:14px;height:14px}

  /* bot body (no outer bubble) */
  .bot-body{padding:0;color:#fff;white-space:pre-wrap;line-height:1.2;font-size:14px;position:relative;overflow:visible;word-break:break-word;margin:0}
  .bot-body p{margin:0}
  pre.code-block{position:relative;background:#0b0b10;padding:12px;border-radius:8px;overflow:auto;margin:8px 0;font-family:ui-monospace,Menlo,Monaco,'Roboto Mono',monospace;font-size:13px;color:#e6edf3}
  .copy-code{position:absolute;right:8px;top:8px;width:26px;height:26px;padding:4px;border-radius:6px;cursor:pointer;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center}
  .copy-code img{width:16px;height:16px}

  /* user bubble */
  .row-user{display:flex;justify-content:flex-end;align-items:flex-end;width:100%}
  .user-bubble{
    background:linear-gradient(90deg,var(--user-a),var(--user-b));
    color:#ffdff4;padding:10px 14px;border-radius:14px 14px 6px 14px;max-width:60%;min-width:80px;
    box-shadow:0 6px 18px rgba(0,0,0,0.6);position:relative;white-space:pre-wrap;line-height:1.2;font-size:14px;overflow-wrap:break-word;margin:0 0 0 8px;transition:box-shadow .12s;
    margin-left:auto;
  }
  .copy-user{position:absolute;right:-36px;top:6px;width:20px;height:20px;padding:3px;border-radius:6px;background:rgba(255,255,255,0.02);opacity:0;transition:opacity .12s}
  .row-user:hover .copy-user{opacity:1}

  /* animations */
  .user-appear{animation:flyIn .36s cubic-bezier(.2,.9,.27,1)}
  @keyframes flyIn{0%{opacity:0;transform:translateY(12px) translateX(40px) scale(.98)}60%{opacity:1;transform:translateY(-4px) translateX(-6px) scale(1.02)}100%{opacity:1;transform:none}}

  .bot-char{display:inline-block;opacity:0;transform:translateY(4px);animation:charIn .06s forwards}
  @keyframes charIn{to{opacity:1;transform:none}}

  /* typing star: lower baseline so it appears like a period next to text */
  .typing-star{display:inline-block;width:16px;height:16px;vertical-align:baseline;margin-left:6px;opacity:0;transform:translateY(6px) scale(.92);transition:opacity .18s, transform .18s}
  .typing-star img{width:100%;height:100%;display:block}
  .typing-star.visible{opacity:1;transform:translateY(2px) scale(1.08);filter:drop-shadow(0 6px 12px rgba(0,0,0,0.25))}
  .typing-star.big{ transform:translateY(0) scale(1.4); }
  .bot-card:hover .typing-star{ opacity:1 !important; transform:translateY(2px) scale(1.08) !important; }

  /* input */
  .input-area{padding:12px;border-top:1px solid rgba(255,255,255,0.03);display:flex;align-items:center;gap:10px}
  .input-wrap{position:relative;flex:1}
  textarea.input{width:100%;min-height:44px;max-height:200px;resize:none;padding:12px 58px 12px 12px;border-radius:12px;border:1px solid rgba(255,255,255,0.04);background:transparent;color:#fff;font-size:14px;line-height:1.25;font-family:var(--font)}
  textarea.input:focus{box-shadow:0 12px 28px rgba(255,73,160,0.08);transform:translateY(-1px)}
  .send-circle{position:absolute;right:10px;top:50%;transform:translateY(-50%);width:36px;height:36px;border-radius:100px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,var(--accent-a),var(--accent-b));border:none;cursor:pointer;box-shadow:0 16px 38px rgba(255,73,160,0.14);display:none;transition:transform .12s, box-shadow .18s}
  .input-wrap.ready .send-circle{display:flex}
  .send-circle img{width:18px;height:18px}

  /* select / field ui (dark background + white text) */
  .field{background:rgba(0,0,0,0.9); color:#fff; border-radius:8px; padding:8px; border:1px solid rgba(255,255,255,0.04); font-family:var(--font)}

  /* purchase button & spinner */
  .purchase-btn{ background: linear-gradient(90deg,var(--accent-a),var(--accent-b)); color:#fff; border:0; padding:10px 12px; border-radius:8px; cursor:pointer; font-weight:700; display:inline-flex; align-items:center; gap:8px; box-shadow:0 12px 30px rgba(0,0,0,0.3); }
  .btn-spinner{ width:14px; height:14px; border-radius:50%; border:2px solid rgba(255,255,255,0.22); border-top-color: #fff; animation:spin .8s linear infinite; display:inline-block }
  @keyframes spin{ from{ transform:rotate(0) } to{ transform:rotate(360deg) } }

  /* modal, inputs */
  .modal-backdrop{position:fixed;inset:0;background:rgba(2,4,10,0.85);display:flex;align-items:center;justify-content:center;z-index:90}
  .modal{width:520px;max-width:calc(100% - 32px);background:linear-gradient(180deg, #0b0712, #0f0716);padding:14px;border-radius:10px;border:1px solid rgba(255,255,255,0.04);box-shadow:0 20px 60px rgba(0,0,0,0.6)}
  .modal img.full{width:100%;height:auto;border-radius:8px;margin:6px 0}
  .field{width:100%;padding:8px;border-radius:8px;background:rgba(0,0,0,0.9);border:1px solid rgba(255,255,255,0.04);color:#fff;font-family:var(--font)}
  .ttt-board{width:320px;height:320px;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:12px 0;position:relative}
  .ttt-cell{background:rgba(255,255,255,0.02);display:flex;align-items:center;justify-content:center;font-size:46px;border-radius:8px;cursor:pointer;transition:transform .12s, background .12s;user-select:none;aspect-ratio:1/1}
  .ttt-cell:hover{transform:scale(1.04);background:rgba(255,255,255,0.035)}
  .ttt-line{position:absolute;left:0;top:0;width:100%;height:100%;pointer-events:none; display:none}

  .reset-btn{position:fixed;right:18px;bottom:18px;z-index:60;padding:8px 10px;border-radius:8px;background:rgba(255,255,255,0.02);color:#fff;border:1px solid rgba(255,255,255,0.04);cursor:pointer}

  /* responsive */
  @media(max-width:900px){.app{grid-template-columns:1fr}.sidebar{order:2}.panel{order:1;height:calc(100vh - 200px)}}
</style>
</head>
<body>
  <div class="app" aria-live="polite">
    <!-- Sidebar -->
    <aside class="sidebar">
      <header class="sidebar-h">
        <div style="display:flex;align-items:center;gap:8px">
          <!-- makalina button: IMAGE ONLY (no border) -->
          <button id="makalinaBtn" class="makalina-img" title="Get Makalina">
            <img src="makalina.png" alt="makalina">
          </button>
          <strong style="font-size:14px">Conversations</strong>
        </div>
        <button class="new-btn" id="newConv">New</button>
      </header>

      <div class="conv-list" id="convList"></div>

      <div class="sidebar-note">Click a conversation to open. Use trash to delete. Play tic-tac-toe below.</div>

      <div style="margin-top:auto;display:flex;gap:8px;align-items:center">
        <button class="new-btn" id="playTttBtn">Play tic-tac-toe</button>
      </div>
    </aside>

    <!-- Panel -->
    <main class="panel" role="main">
      <div class="header">
        <div class="brand">
          <img id="brandImg" src="makala.png" alt="m">
          <h1 id="convTitle">New conversation</h1>

          <div class="user-info" id="userInfo" style="display:none;margin-left:10px">
            <div class="pfp" id="userPfp"><img src="makala.png" alt="pfp"></div>
            <div class="name" id="userNameDisplay"></div>
            <div class="coins" style="margin-left:8px"><img src="coins.png" style="width:18px;height:18px" class="spin" alt="coins"><span id="coinCount">0</span></div>
          </div>
        </div>

        <div style="margin-left:auto;display:flex;gap:8px;align-items:center">
          <label style="font-size:13px;color:var(--muted);margin-right:6px">Personality</label>
          <select id="convPersonality" class="field" style="width:200px">
            <option value="makala">makala</option>
            <option value="serious">serious</option>
            <option value="makalina">makalina ai</option>
          </select>
        </div>
      </div>

      <div class="messages-wrap" id="messages" role="log" aria-live="polite" aria-atomic="false"></div>

      <div class="input-area">
        <div class="input-wrap" id="inputWrap">
          <textarea id="input" class="input" placeholder="ask me anything..." rows="1" spellcheck="false" aria-label="message input"></textarea>
          <div class="send-circle" id="sendBtn" title="Send"><img src="send-circle.png" alt="send"></div>
        </div>
      </div>
    </main>
  </div>

  <div style="position:fixed;right:18px;bottom:86px;z-index:40">
    <select id="themeSelect" aria-label="Theme" class="field" style="padding:8px 12px">
      <option value="pink">purple & pink</option>
      <option value="deep">deep black</option>
      <option value="soft">soft purple</option>
      <option value="blue">navy blue</option>
      <option value="orange">dark orange</option>
      <option value="red">dark red</option>
      <option value="green">dark green</option>
    </select>
  </div>

  <div id="modalContainer"></div>
  <button id="resetBtn" class="reset-btn">Reset (temp)</button>

<script>
/* ---------- helpers ---------- */
const $ = (s,root=document) => root.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,8);
const rtrimNewlines = s => String(s||'').replace(/\r/g,'').replace(/\n+$/,'');
const sanitize = html => DOMPurify.sanitize(html);

/* ---------- state ---------- */
let convs = JSON.parse(localStorage.getItem('makala_convs')||'[]'); if(!Array.isArray(convs)) convs=[];
let activeConvId = localStorage.getItem('makala_activeConv') || (convs[0]?.id || null);
const settings = {
  userName: localStorage.getItem('makala_user') || '',
  makalinaOwned: localStorage.getItem('makala_owned') === '1',
  coins: Number(localStorage.getItem('makala_coins') || 0),
  pfpData: localStorage.getItem('makala_pfp') || null
};
function saveConvs(){ localStorage.setItem('makala_convs', JSON.stringify(convs)); }
function saveActive(){ localStorage.setItem('makala_activeConv', activeConvId||''); }
function saveOwnership(){ localStorage.setItem('makala_owned', settings.makalinaOwned ? '1' : '0'); localStorage.setItem('makala_coins', String(settings.coins||0)); if(settings.pfpData) localStorage.setItem('makala_pfp', settings.pfpData); if(settings.userName) localStorage.setItem('makala_user', settings.userName); }

/* ---------- refs ---------- */
const convListEl = $('#convList'), messagesWrap = $('#messages'), newConvBtn = $('#newConv'),
      convTitle = $('#convTitle'), input = $('#input'), inputWrap = $('#inputWrap'),
      sendBtn = $('#sendBtn'), themeSelect = $('#themeSelect'), modalContainer = $('#modalContainer'),
      makalinaBtn = $('#makalinaBtn'), playTttBtn = $('#playTttBtn'),
      brandImg = $('#brandImg'), convPersonality = $('#convPersonality'),
      resetBtn = $('#resetBtn'), userInfo = $('#userInfo'), userPfp = $('#userPfp'),
      userNameDisplay = $('#userNameDisplay'), coinCountEl = $('#coinCount');

/* ---------- favicon helper ---------- */
function setFavicon(){
  const link = document.getElementById('favicon') || document.createElement('link');
  link.id = 'favicon';
  link.rel = 'icon';
  link.href = settings.makalinaOwned ? '/makalina.ico' : '/makala.ico';
  if(!document.getElementById('favicon')) document.head.appendChild(link);
}

/* ---------- init ---------- */
/* ensure at least one convo exists; when none, create with title 'makala.ai' */
(function ensureDefault(){
  if(convs.length===0){
    const c={id:uid(),title:'makala.ai',created:Date.now(),messages:[],renderedCount:0,personality:'makala'};
    convs.unshift(c); activeConvId=c.id; saveConvs(); saveActive();
  }
  if(!activeConvId) activeConvId = convs[0].id;
})();
(function initTheme(){ const t = localStorage.getItem('makala_theme')||'pink'; document.body.className = 'theme-'+t; themeSelect.value=t; })();
setFavicon(); renderConvList(); setActiveConv(activeConvId, { clear:true, animate:false }); renderUserInfo(); enforceMakalinaAvailability();

/* ---------- conv list ---------- */
function relativeTime(ts){ const now=Date.now(); const s = Math.floor((now-ts)/1000); if(s<60) return 'just now'; if(s<3600) return Math.floor(s/60)+'m ago'; const dNow=new Date(), dTs=new Date(ts); if(dNow.toDateString()===dTs.toDateString()) return 'Today'; const yesterday=new Date(now-86400000); if(yesterday.toDateString()===dTs.toDateString()) return 'Yesterday'; const days=Math.floor(s/86400); if(days<7) return days+'d ago'; if(days<30) return Math.floor(days/7)+'w ago'; const yrs=Math.floor(days/365); if(yrs===1) return 'A year ago'; if(yrs>=2) return 'A long time ago'; return Math.floor(days/30)+'mo ago'; }

function renderConvList(){
  convListEl.innerHTML=''; convs.forEach(c=>{
    const el=document.createElement('div'); el.className='conv'+(c.id===activeConvId?' active':''); el.dataset.id=c.id;
    const icon=document.createElement('img'); icon.src=(c.personality==='makalina'?'linalogo.png':'makala.png'); icon.style.width='28px'; icon.style.height='28px'; icon.style.borderRadius='6px';
    const inner=document.createElement('div'); inner.innerHTML = `<div style="font-size:14px">${sanitize(c.title||'makala.ai')}</div><div class="conv-meta">${relativeTime(c.created||Date.now())}</div>`;
    const trash=document.createElement('img'); trash.src='trash.png'; trash.className='trash'; trash.alt='del';
    el.appendChild(icon); el.appendChild(inner); el.appendChild(trash); convListEl.appendChild(el);
    el.addEventListener('click', (ev)=>{ if(ev.target === trash){ if(confirm('Delete this conversation?')) deleteConv(c.id); return; } setActiveConv(c.id, { clear:true, animate:false }); });
  });
}

/* ---------- conv mgmt ---------- */
function createConv(title='makala.ai'){ const c={id:uid(),title:title||'makala.ai',created:Date.now(),messages:[],renderedCount:0,personality:'makala'}; convs.unshift(c); saveConvs(); renderConvList(); setActiveConv(c.id,{clear:true,animate:false}); return c; }
function deleteConv(id){ const i=convs.findIndex(x=>x.id===id); if(i>=0) convs.splice(i,1); if(activeConvId===id) activeConvId=convs[0]?.id||null; saveConvs(); saveActive(); renderConvList(); if(convs.length===0){ createConv('makala.ai'); } setActiveConv(activeConvId,{clear:true,animate:false}); }

function setActiveConv(id, opts={clear:false,animate:false}){ activeConvId=id; saveActive(); renderConvList(); const conv=convs.find(x=>x.id===id); if(!conv) return; convTitle.textContent = conv.title || 'makala.ai'; convPersonality.value = conv.personality || 'makala'; if(opts.clear){ messagesWrap.innerHTML=''; conv.renderedCount=0; } const start = conv.renderedCount||0; for(let i=start;i<conv.messages.length;i++){ appendMessageToDOM(conv, conv.messages[i], { animate: (i===conv.messages.length-1) && !!opts.animate }); conv.renderedCount = i+1; } messagesWrap.scrollTop = messagesWrap.scrollHeight; brandImg.src = (conv.personality==='makalina') ? 'linastar.png' : 'makala.png'; document.title = conv.title || 'makala.ai'; enforceMakalinaAvailability(); }

/* ---------- message rendering ---------- */
function appendUserToDOM(conv, m, { animate=false } = {}){
  const row=document.createElement('div'); row.className='row-user';
  const bubble=document.createElement('div'); bubble.className='user-bubble';
  bubble.textContent = rtrimNewlines(m.content||'');
  const copy = document.createElement('img'); copy.src='copy.png'; copy.className='copy-user'; copy.title='copy'; copy.style.width='18px'; copy.style.height='18px';
  copy.addEventListener('click', ()=> navigator.clipboard.writeText(m.content||''));
  bubble.appendChild(copy); if(animate) bubble.classList.add('user-appear');
  row.appendChild(bubble); messagesWrap.appendChild(row); messagesWrap.scrollTop = messagesWrap.scrollHeight;
}

function appendBotToDOM(conv, m, { animate=false } = {}){
  const cont=document.createElement('div'); cont.className='bot-card';
  const meta=document.createElement('div'); meta.className='bot-meta';
  const small=document.createElement('img'); small.src=(conv.personality==='makalina'?'linastar.png':'makala.png'); small.alt='m'; small.style.width='18px'; small.style.height='18px';
  const label=document.createElement('div'); label.className='bot-label'; label.textContent=(conv.personality==='makalina'?'makalina ai':'makala ai');
  const metaCopy=document.createElement('div'); metaCopy.className='meta-copy'; metaCopy.title='copy'; metaCopy.innerHTML=`<img src="copy.png" alt="copy">`;
  metaCopy.addEventListener('click', ()=> navigator.clipboard.writeText(m.content||''));
  meta.appendChild(small); meta.appendChild(label); meta.appendChild(metaCopy);
  const body=document.createElement('div'); body.className='bot-body';
  cont.appendChild(meta); cont.appendChild(body); messagesWrap.appendChild(cont); messagesWrap.scrollTop = messagesWrap.scrollHeight;

  cont.addEventListener('mouseenter', ()=> {
    const s = cont.querySelector('.typing-star'); if(s) s.classList.add('visible');
  });
  cont.addEventListener('mouseleave', ()=> {
    const s = cont.querySelector('.typing-star'); if(s && !s.dataset.persistent) s.classList.remove('visible');
  });

  if(animate){
    typeMarkdownIntoElement(rtrimNewlines(m.content||''), body, conv);
  } else {
    body.innerHTML = sanitizeAndTrim(marked.parse(rtrimNewlines(m.content||'')));
    renderMathInElement(body); attachCodeCopyButtons(body);
    const s = attachOrGetStar(body, conv);
    s.classList.remove('visible');
    s.dataset.persistent = '0';
  }
}

/* trim trailing blanks */
function sanitizeAndTrim(html){
  const clean = DOMPurify.sanitize(html);
  const wrapper = document.createElement('div'); wrapper.innerHTML = clean;
  while(wrapper.lastChild && isEmptyNode(wrapper.lastChild)) wrapper.removeChild(wrapper.lastChild);
  return wrapper.innerHTML;
}
function isEmptyNode(node){
  if(!node) return true;
  if(node.nodeType === Node.TEXT_NODE) return !node.textContent.trim();
  if(node.nodeType === Node.ELEMENT_NODE){
    const tag = node.tagName.toLowerCase();
    if(tag==='br') return true;
    if(!node.textContent.trim() && node.querySelectorAll('img,svg,code,pre').length === 0) return true;
  }
  return false;
}

/* typing star (attach to last paragraph / end of content) */
function attachOrGetStar(container, conv){
  let s = container.querySelector('.typing-star');
  if(!s){
    s = document.createElement('span'); s.className='typing-star';
    const img = document.createElement('img'); img.src = (conv.personality==='makalina'?'linastar.png':'star.png'); img.alt='*'; img.style.width='100%'; img.style.height='100%';
    s.appendChild(img);
    const lastP = container.querySelector('p:last-of-type') || container.lastElementChild;
    if(lastP) lastP.appendChild(s); else container.appendChild(s);
    s.dataset.persistent = '0';
  } else {
    const img = s.querySelector('img'); if(img) img.src = (conv.personality==='makalina'?'linastar.png':'star.png');
  }
  return s;
}

/* typing reveal (per char) with bigger temporary star while generating */
async function typeMarkdownIntoElement(text, container, conv){
  container.dataset.animating = '1';
  container.innerHTML = '';
  const total = text.length || 1;
  const baseDelay = Math.max(4, Math.min(18, 110 / Math.sqrt(total)));
  let buffer = '';
  for(let i=0;i<text.length;i++){
    buffer += text[i];
    const flush = (i%8===0) || /[.!?\n]/.test(text[i]) || i===text.length-1;
    if(flush){
      container.innerHTML = sanitizeAndTrim(marked.parse(rtrimNewlines(buffer)));
      renderMathInElement(container); attachCodeCopyButtons(container);
      const s = attachOrGetStar(container, conv);
      s.classList.add('visible','big');
      s.dataset.persistent = '0';
      await new Promise(r=>setTimeout(r, baseDelay * (1 + Math.random()*0.4)));
    } else {
      await new Promise(r=>setTimeout(r, baseDelay));
    }
    messagesWrap.scrollTop = messagesWrap.scrollHeight;
  }
  container.innerHTML = sanitizeAndTrim(marked.parse(rtrimNewlines(text)));
  renderMathInElement(container); attachCodeCopyButtons(container);
  const finalStar = attachOrGetStar(container, conv); finalStar.classList.add('visible'); finalStar.classList.remove('big');
  finalStar.dataset.persistent = '0';
  await new Promise(r=>setTimeout(r, 1500));
  if(!finalStar.matches(':hover')) finalStar.classList.remove('visible');
  finalStar.addEventListener('mouseenter', ()=> finalStar.classList.add('visible'));
  finalStar.addEventListener('mouseleave', ()=> { if(finalStar.dataset.persistent !== '1') finalStar.classList.remove('visible'); });
  delete container.dataset.animating;
}

/* code copy */
function attachCodeCopyButtons(container){
  const pres = container.querySelectorAll('pre');
  pres.forEach(pre=>{
    if(pre.querySelector('.copy-code')) return;
    const btn = document.createElement('div'); btn.className='copy-code'; btn.title='copy'; btn.innerHTML=`<img src="copy.png" alt="copy">`;
    btn.addEventListener('click', ()=> { const code = pre.querySelector('code'); if(code) navigator.clipboard.writeText(code.textContent); btn.style.opacity=.6; setTimeout(()=>btn.style.opacity=1,300); });
    pre.appendChild(btn);
  });
}

/* katex math */
function renderMathInElement(el){
  let html = el.innerHTML;
  html = html.replace(/\$\$([\s\S]+?)\$\$/g, (_,expr)=>`<span class="katex-display" data-katex="${encodeURIComponent(expr)}"></span>`);
  html = html.replace(/\$([^\$]+?)\$/g, (_,expr)=>`<span class="katex-inline" data-katex="${encodeURIComponent(expr)}"></span>`);
  el.innerHTML = html;
  const nodes = el.querySelectorAll('[data-katex]');
  nodes.forEach(node=>{
    const expr = decodeURIComponent(node.getAttribute('data-katex'));
    try{ katex.render(expr, node, { throwOnError:false, displayMode: node.classList.contains('katex-display') }); } catch(e){ node.textContent = expr; }
    node.removeAttribute('data-katex');
  });
}

/* ---------- server comms (unchanged) ---------- */
async function sendToServer(payload){
  const resp = await fetch('/api/chat',{ method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload) });
  if(!resp.ok) throw new Error(await resp.text());
  return resp.json();
}
function normalizeServerReply(data){
  if(!data) return '';
  if(typeof data === 'string') return data;
  if(data.reply && typeof data.reply==='string') return data.reply;
  if(data.raw && data.raw.choices && data.raw.choices[0]){
    const c = data.raw.choices[0];
    return c.message?.content || c.text || '';
  }
  if(data.choices && data.choices[0] && data.choices[0].message) return data.choices[0].message.content || '';
  return String(data);
}

/* ---------- send flow ---------- */
async function handleSend(){
  const raw = input.value; const trimmed = rtrimNewlines(raw);
  if(!trimmed.trim()){ input.classList.add('shake'); input.focus(); setTimeout(()=> input.classList.remove('shake'),320); return; }
  const conv = convs.find(c=>c.id===activeConvId); if(!conv) return;
  const userMsg = { role:'user', content: rtrimNewlines(raw), created: Date.now() };
  conv.messages.push(userMsg); saveConvs();
  appendUserToDOM(conv, userMsg, { animate:true });
  autoResize(); input.value=''; inputWrap.classList.remove('ready');

  // placeholder typing row
  conv.messages.push({ role:'assistant', content:'', temp:true, created: Date.now() }); saveConvs();
  const typingNode = document.createElement('div'); typingNode.className='bot-card'; typingNode.id='__typing_row';
  typingNode.innerHTML = `<div class="bot-meta"><img src="${conv.personality==='makalina'?'linastar.png':'makala.png'}"><div class="bot-label">${conv.personality==='makalina'?'makalina ai':'makala ai'}</div><div class="meta-copy"><img src="copy.png" alt="copy"></div></div><div class="bot-body"><span class="typing"><span class="dot"></span><span class="dot"></span><span class="dot"></span></span></div>`;
  messagesWrap.appendChild(typingNode); messagesWrap.scrollTop = messagesWrap.scrollHeight;

  const messagesPayload = [{ role:'system', content: systemPromptForConv(conv) }, ...conv.messages.filter(m=>!m.temp).map(m=>({ role:m.role, content:m.content }))];

  try{
    const replyData = await sendToServer({ messages: messagesPayload });
    const replyText = normalizeServerReply(replyData) || 'no response.';
    conv.messages = conv.messages.filter(m=>!m.temp);
    const serverMsg = { role:'assistant', content: replyText, created: Date.now() };
    conv.messages.push(serverMsg); saveConvs();
    const tr = document.getElementById('__typing_row'); if(tr) tr.remove();
    appendBotToDOM(conv, serverMsg, { animate:true });
    conv.renderedCount = conv.messages.length;

    // set conv title from first user message if still default
    if(!conv.title || conv.title === 'makala.ai' || conv.title === '') {
      const firstUser = conv.messages.find(mm=>mm.role==='user' && (mm.content||'').trim().length>0);
      if(firstUser){ conv.title = firstUser.content.split(/\s+/).slice(0,6).join(' ').slice(0,60); saveConvs(); renderConvList(); convTitle.textContent = conv.title; document.title = conv.title; }
    }
  }catch(err){
    console.error(err);
    const tr = document.getElementById('__typing_row'); if(tr) tr.remove();
    const errMsg = { role:'assistant', content: 'Error: ' + String(err), created: Date.now() };
    conv.messages = conv.messages.filter(m=>!m.temp); conv.messages.push(errMsg); saveConvs();
    appendBotToDOM(conv, errMsg, { animate:true });
  }
}

/* system prompt by personality */
function systemPromptForConv(conv){
  const baseMakala = `You are Makala (female). You speak casual internet slang. Use lowercase except first word, playful tone, use 'lol','fr','so','like','bro', ignore strict grammar, short replies (1-3 sentences). You're Indian and sometimes say 'beta'. You love Indian food and Roblox Steal a Brainrot.`;
  const baseSerious = `You are Makala (female). Speak professionally, clearly, and in complete sentences. Provide helpful, concise answers, formal tone.`;
  const baseMakalina = `You are Makalina (female). Mature, witty, creative humor, helpful but polished.`;
  const persona = conv.personality || 'makala';
  const note = settings.userName ? ` When addressing the user, call them ${settings.userName}.` : '';
  if(persona==='serious') return baseSerious + note;
  if(persona==='makalina') return baseMakalina + note;
  return baseMakala + note;
}

/* Ensure Makalina personality option and TTT availability reflect ownership */
function enforceMakalinaAvailability(){
  const opt = Array.from(convPersonality.options).find(o=>o.value==='makalina');
  if(opt) opt.disabled = !settings.makalinaOwned;
  if(!settings.makalinaOwned){
    const conv = convs.find(c=>c.id===activeConvId);
    if(conv && conv.personality==='makalina'){ conv.personality='makala'; saveConvs(); setActiveConv(activeConvId,{clear:true,animate:false}); }
  }

  makalinaBtn.onclick = ()=> { if(!settings.makalinaOwned) openMakalinaModal(); };
}

/* ---------- Tic Tac Toe ---------- */
function openTicTacToe(){
  if(!settings.makalinaOwned){ openMakalinaModal(); return; }
  modalContainer.innerHTML = `<div class="modal-backdrop"><div class="modal"><h3 style="margin:0 0 8px">tic-tac-toe — play makala</h3><div id="tttBoardWrapper" style="position:relative"><div id="tttBoard" class="ttt-board"></div></div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px"><div>Your coins: <img src="coins.png" style="width:18px;height:18px;vertical-align:middle;margin-right:6px" class="spin"> <span id="coinCountModal">${settings.coins}</span></div><div style="display:flex;gap:8px"><button id="tttReset" class="new-btn">Reset board</button><button id="closeTtt" class="new-btn">Close</button></div></div></div></div>`;
  modalContainer.style.display='block';
  const board = $('#tttBoard'); let state = Array(9).fill(''); let done=false;
  const conv = convs.find(c=>c.id===activeConvId) || { personality:'makala' };

  function renderBoard(){ board.innerHTML=''; state.forEach((v,i)=>{ const cell=document.createElement('div'); cell.className='ttt-cell'; cell.dataset.i=i; if(v==='X'){ const img=document.createElement('img'); img.src = (conv.personality==='makalina'?'linastar.png':'star.png'); img.style.width='46px'; img.style.height='46px'; cell.appendChild(img); } else if(v==='O'){ cell.textContent='O'; } cell.addEventListener('click', ()=> onCell(i,cell)); board.appendChild(cell); }); }
  function onCell(i,el){ if(done || state[i]) return; state[i]='O'; renderBoard(); if(checkWin('O')) return endGame(true); if(state.every(Boolean)) return endGame(null); setTimeout(()=>{ const free = state.map((v,idx)=> v?null:idx).filter(v=>v!==null); const pick = free[Math.floor(Math.random()*free.length)]; state[pick]='X'; renderBoard(); if(checkWin('X')) return endGame(false); if(state.every(Boolean)) return endGame(null); }, 420); }
  function checkWin(sym){ const wins=[[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]]; return wins.find(w=> w.every(i=> state[i]===sym)); }
  function endGame(userWon){ done=true; const amt=Math.floor(Math.random()*50)+1; if(userWon===true){ settings.coins=(settings.coins||0)+amt; setTimeout(()=> alert(`you win ${amt} makala's coins!`), 120); } else if(userWon===false){ settings.coins=Math.max(0,(settings.coins||0)-amt); setTimeout(()=> alert(`you lost ${amt} coins...`), 120); } else setTimeout(()=> alert('draw — no coins'), 120); saveOwnership(); $('#coinCountModal').textContent=settings.coins; coinCountEl.textContent=settings.coins; setTimeout(()=>{ state = Array(9).fill(''); done=false; renderBoard(); }, 2200); }
  $('#tttReset').addEventListener('click', ()=> { state = Array(9).fill(''); done=false; renderBoard(); });
  $('#closeTtt').addEventListener('click', ()=> { modalContainer.innerHTML=''; modalContainer.style.display='none'; });
  renderBoard();
}
