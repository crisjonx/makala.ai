function renderHomeFromSaved(){if(location.pathname.startsWith('/c/')){const id=location.pathname.split('/c/')[1].replace(/\/+$/,'');const found=state.conversations.find(c=>c.id===id);if(found)openConversation(found.id,{push:false});else{history.replaceState({},'','/');goHome(true)}}else goHome(true)}
function autoGrow(el){if(!el)return;el.style.height='auto';const max=el.classList.contains('home-input')?150:130;el.style.height=Math.min(el.scrollHeight,max)+'px'}
function wireEvents(){els.themeSelect.addEventListener('change',()=>setTheme(els.themeSelect.value));els.clearBtn.addEventListener('click',clearChats);els.homeSendBtn.addEventListener('click',()=>sendMessage(els.homeInput.value,'home'));els.sendBtn.addEventListener('click',()=>sendMessage(els.messageInput.value,'message'));els.homeInput.addEventListener('input',()=>autoGrow(els.homeInput));els.messageInput.addEventListener('input',()=>{autoGrow(els.messageInput);updateDraftFromInput(els.messageInput.value)});els.homeInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(els.homeInput.value,'home')}});els.messageInput.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage(els.messageInput.value,'message')}});document.querySelectorAll('.suggestion').forEach(btn=>btn.addEventListener('click',()=>{const p=btn.dataset.prompt||btn.textContent||'';els.homeInput.value=p;autoGrow(els.homeInput);els.homeInput.focus()}));els.newsBtn.addEventListener('click',openNews);els.makalinaBtn.addEventListener('click',openBuyMakalina);els.infoBtn.addEventListener('click',openAbout);els.modalRoot.addEventListener('click',e=>{if(e.target.classList.contains('modal-backdrop')){clearInterval(state.newsTimer);closeModal()}});window.addEventListener('popstate',()=>renderHomeFromSaved());window.addEventListener('resize',()=>{autoGrow(els.homeInput);autoGrow(els.messageInput)})}
function init(){loadState();renderThemeSelect();setTheme(state.theme);wireEvents();renderAll();document.body.classList.add('loaded');fetchCountry();fetchCommit();if(!state.conversations.length)goHome(true);setInterval(()=>{renderConvList()},60000)}
init();
</script>
</body>
</html>
