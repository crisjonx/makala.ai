<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>makala.ai</title>
<link rel="icon" href="/makala.ico" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@2.4.0/dist/purify.min.js"></script>

<style>
:root{
  --bg:#111827;
  --bg2:#0f172a;
  --panel:#111827;
  --panel2:#0b1220;
  --line:rgba(255,255,255,.08);
  --text:#f8fafc;
  --muted:#cbd5e1;
  --accent:#8b5cf6;
  --accent2:#06b6d4;
  --user:#1e293b;
  --user2:#0f172a;
  --bot:#111827;
  --radius:16px;
  --font:Inter, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0;overflow:hidden;font-family:var(--font);color:var(--text);background:linear-gradient(180deg,var(--bg),var(--bg2))}
button,input,textarea,select{font:inherit;color:inherit}
button{cursor:pointer}
body.theme-pink{--bg:#12111f;--bg2:#1b1027;--accent:#ff4fa8;--accent2:#ff7fca;--user:#25102c;--user2:#12071a;--bot:#17141f}
body.theme-deep{--bg:#05070c;--bg2:#090b12;--accent:#ff4d9d;--accent2:#c084fc;--user:#10131a;--user2:#07090f;--bot:#0e1118}
body.theme-blue{--bg:#081426;--bg2:#0d1728;--accent:#56b6ff;--accent2:#8ddcff;--user:#10243b;--user2:#091423;--bot:#0d1728}
body.theme-orange{--bg:#201208;--bg2:#1a130d;--accent:#ff9f43;--accent2:#ffc27a;--user:#321707;--user2:#1b0d05;--bot:#20120a}
body.theme-red{--bg:#220b0b;--bg2:#160909;--accent:#ff5b6e;--accent2:#ff9aa4;--user:#341010;--user2:#1c0909;--bot:#220d0d}
body.theme-green{--bg:#071811;--bg2:#08130d;--accent:#34d399;--accent2:#8ee8c3;--user:#10231a;--user2:#07130e;--bot:#0d1712}

#modalRoot{position:fixed;inset:0;z-index:90;pointer-events:auto}
.home-send-btn{width:46px;min-width:46px;padding:0;display:grid;place-items:center}
.home-send-btn img{filter:none}
.sidebar-footer .stack{grid-template-columns:1fr}
.makalina-launch{display:none}
body.theme-teal{--bg:#071920;--bg2:#0b2730;--accent:#3dd6c6;--accent2:#84f0e6;--user:#0f2a32;--user2:#07171c;--bot:#0b1d22}
body.theme-indigo{--bg:#0f1028;--bg2:#1a1e44;--accent:#7c8cff;--accent2:#b4bbff;--user:#141736;--user2:#0c1028;--bot:#10142d}
body.theme-gold{--bg:#1b1407;--bg2:#2c2109;--accent:#f4c24b;--accent2:#ffe08a;--user:#2d210b;--user2:#171004;--bot:#20180b}
body.theme-slate{--bg:#101418;--bg2:#171d24;--accent:#9bb0c9;--accent2:#d0d7e2;--user:#1b2129;--user2:#10151b;--bot:#141a21}
body.theme-violet{--bg:#120f22;--bg2:#25143b;--accent:#b16cff;--accent2:#d0a8ff;--user:#21143a;--user2:#120d21;--bot:#171129}


.app{
  width:min(1360px,calc(100vw - 14px));
  height:calc(100vh - 14px);
  margin:7px auto;
  display:grid;
  grid-template-columns:300px 1fr;
  gap:10px;
  min-height:0;
}
.sidebar,.panel{
  border:1px solid var(--line);
  border-radius:var(--radius);
  background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));
  min-height:0;
  overflow:hidden;
}
.sidebar{display:flex;flex-direction:column;padding:12px}
.panel{display:flex;flex-direction:column;position:relative}

.btn,.chip,.conv-item,.home-item,.file-button,.ttt-cell,.suggestion{
  transition:background .16s ease,border-color .16s ease,color .16s ease,transform .16s ease,opacity .16s ease;
}
.btn:hover,.chip:hover,.conv-item:hover,.home-item:hover,.file-button:hover,.suggestion:hover,.ttt-cell:hover{transform:translateY(-1px)}
.btn:active,.chip:active,.file-button:active,.suggestion:active,.ttt-cell:active{transform:translateY(0)}

.sidebar-head{
  display:flex;align-items:center;justify-content:space-between;gap:8px;padding-bottom:10px
}
.sidebar-title{font-size:14px;font-weight:600}
.btn{
  height:38px;padding:0 12px;border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:12px;display:inline-flex;align-items:center;justify-content:center;gap:8px
}
.btn.primary{background:linear-gradient(90deg,var(--accent),var(--accent2));border-color:transparent}
.btn.icon{width:38px;padding:0}
.btn.ghost{background:transparent}
.btn.compact{height:34px;padding:0 10px;border-radius:10px;font-size:13px}
.btn.full{width:100%}
.icon-plus{font-size:24px;line-height:1;margin-top:-1px}

.conv-list{flex:1;min-height:0;overflow:auto;display:flex;flex-direction:column;gap:8px;padding-right:4px}
.conv-item,.home-item{
  border:1px solid var(--line);border-radius:14px;background:rgba(255,255,255,.02);padding:10px;display:flex;gap:10px;align-items:center;cursor:pointer
}
.conv-item.active,.home-item.active{background:rgba(255,255,255,.07);border-color:rgba(255,255,255,.18)}
.conv-icon{width:28px;height:28px;border-radius:8px;object-fit:cover;flex:0 0 auto}
.home-icon{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;background:rgba(255,255,255,.05);flex:0 0 auto}
.conv-copy{min-width:0;flex:1}
.conv-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-meta{font-size:11px;color:var(--muted)}
.conv-trash{width:18px;height:18px;border:0;background:none;padding:0;display:grid;place-items:center;opacity:.95;flex:0 0 auto}

.sidebar-footer{display:grid;gap:8px;padding-top:10px}
.sidebar-footer .stack{display:grid;gap:8px;grid-template-columns:1fr 1fr}
.makalina-launch{width:100%;height:54px;border:1px solid var(--line);border-radius:16px;overflow:hidden;padding:0;background:rgba(255,255,255,.02);display:flex;align-items:center;justify-content:center}
.makalina-launch img{width:100%;height:100%;object-fit:cover;display:block}

.topbar{
  position:relative;
  display:flex;align-items:center;gap:10px;padding:10px 12px;border-bottom:1px solid var(--line);min-height:58px
}
.brand{display:flex;align-items:center;gap:10px;min-width:0}
.brand img{width:30px;height:30px;border-radius:8px;display:block}
.brand h1{margin:0;font-size:16px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clock{
  position:absolute;left:50%;top:8px;transform:translateX(-50%);
  font-size:12px;font-style:italic;color:var(--muted);pointer-events:none
}
.right-tools{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
select,input,textarea{
  background:rgba(2,6,23,.96);
  color:#fff;
  border:1px solid var(--line);
  border-radius:12px;
  outline:none;
}
select, input[type=text]{height:38px;padding:0 12px}
select option{background:#050814;color:#fff}

.chat{flex:1;min-height:0;display:flex;flex-direction:column}
.hidden{display:none !important}

.empty-state{flex:1;min-height:0;display:grid;place-items:center;padding:18px}
.empty-card{
  width:min(760px,100%);
  display:grid;
  gap:14px;
  text-align:center;
  justify-items:stretch;
}
.empty-card h2{margin:0;font-size:40px;letter-spacing:-.04em}
.empty-card p{margin:0;color:var(--muted);font-size:14px}
.home-input,.composer textarea{
  width:100%;min-height:76px;padding:14px;border-radius:16px;line-height:1.45;font-size:15px;resize:none;overflow:hidden
}
.home-input{min-height:82px}
.suggestions{display:flex;flex-wrap:wrap;gap:10px;justify-content:center}
.suggestion{
  border:1px solid var(--line);background:rgba(255,255,255,.03);border-radius:999px;color:#fff;padding:10px 14px;cursor:pointer;font-size:13px
}

.message-wrap{flex:1;min-height:0;overflow:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
.message-row{width:100%;min-width:0;display:flex;gap:10px;align-items:flex-start}
.message-row.user{justify-content:flex-end}
.message-row.bot{justify-content:flex-start}
.message-row.fade-in{animation:msgIn .16s ease-out both}
@keyframes msgIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

.user-bubble{
  max-width:min(72%,680px);min-width:0;display:inline-block;padding:10px 12px;border-radius:18px 18px 6px 18px;background:linear-gradient(180deg,var(--user),var(--user2));border:1px solid var(--line);line-height:1.45;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word
}
.bot-card{
  max-width:min(76%,760px);min-width:0;display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start
}
.bot-avatar,.typing-avatar{
  width:28px;height:28px;border-radius:8px;display:block;object-fit:cover
}
.typing-avatar.spin{animation:spin 1.8s linear infinite}
.bot-body{
  min-width:0;font-size:14px;line-height:1.45;white-space:pre-wrap;overflow-wrap:anywhere;word-break:break-word
}
.bot-body p,.bot-body ul,.bot-body ol,.bot-body blockquote,.bot-body pre,.bot-body hr,.bot-body h1,.bot-body h2,.bot-body h3,.bot-body h4,.bot-body table{margin:0 0 4px 0}
.bot-body pre{
  background:rgba(255,255,255,.03);border:1px solid var(--line);border-radius:14px;padding:12px;overflow:auto;position:relative
}
.bot-body code{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-size:.95em}
.copy-code{
  position:absolute;right:8px;top:8px;width:24px;height:24px;border:1px solid var(--line);border-radius:8px;background:rgba(0,0,0,.18);display:grid;place-items:center;cursor:pointer
}
.copy-code img{width:14px;height:14px;display:block}

.typing-shell{
  display:grid;grid-template-columns:28px 1fr;gap:10px;align-items:start
}
.typing-text{
  height:28px;display:flex;align-items:center;color:var(--muted);font-size:13px
}
.typing-dots{display:inline-flex;gap:6px;align-items:center}
.typing-dots span{width:7px;height:7px;border-radius:50%;background:var(--muted);animation:bounce 1s infinite ease-in-out}
.typing-dots span:nth-child(2){animation-delay:.15s}
.typing-dots span:nth-child(3){animation-delay:.3s}
@keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.45}40%{transform:translateY(-4px);opacity:1}}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}

.composer{padding:12px;border-top:1px solid var(--line)}
.composer-row{display:flex;gap:10px;align-items:flex-end}
.composer textarea{flex:1;min-height:46px;max-height:150px;padding:12px 12px;line-height:1.45;font-size:15px}
.send-btn{min-width:96px;height:46px}

.file-button{display:inline-flex;align-items:center;justify-content:center;padding:10px 12px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);cursor:pointer;font-size:13px;font-weight:600}
.file-button:hover{background:rgba(255,255,255,.07)}
.loading-btn{display:inline-flex;align-items:center;justify-content:center;gap:10px;min-height:46px}
.loading-btn .spinner{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.25);border-top-color:#fff;animation:spin 0.75s linear infinite}


.modal-backdrop{
  position:fixed;inset:0;background:rgba(3,6,13,.68);display:grid;place-items:center;z-index:50;padding:16px
}
.modal{
  width:min(760px,100%);background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:22px;overflow:hidden;transform-origin:center
}
.modal.show{animation:modalIn .18s ease-out both}
@keyframes modalIn{from{opacity:0;transform:scale(.98) translateY(6px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-head{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line)}
.modal-head h3{margin:0;font-size:18px}
.modal-body{padding:18px;display:grid;gap:14px}

.buy-layout{display:grid;grid-template-columns:1.05fr .95fr;gap:18px}
.buy-hero{display:grid;gap:10px;align-content:start}
.buy-hero img{width:100%;height:220px;object-fit:contain;border:1px solid var(--line);border-radius:18px;background:rgba(255,255,255,.02);padding:10px}
.buy-hero h4{margin:0;font-size:20px;letter-spacing:-.02em}
.buy-hero p{margin:0;color:var(--muted);line-height:1.5;font-size:14px}
.buy-panel{display:grid;gap:12px;align-content:start}
.field{width:100%;height:40px;padding:0 12px}
.file-row{display:flex;gap:10px;align-items:center}
.file-button{
  min-width:132px;height:40px;border:1px solid var(--line);border-radius:12px;background:rgba(255,255,255,.04);
  display:inline-flex;align-items:center;justify-content:center;padding:0 14px;cursor:pointer
}
.file-input{display:none}
.file-name{color:var(--muted);font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.totals{
  display:grid;gap:4px;padding:12px;border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.02)
}
.muted{color:var(--muted)}
.loading-btn{position:relative}
.loading-btn.loading{pointer-events:none;opacity:.92}
.loading-btn .spinner{
  display:inline-block;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.26);border-top-color:#fff;animation:spin .8s linear infinite
}

.ttt-wrap{display:grid;gap:14px}
.ttt-top{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.ttt-board{
  width:min(420px,100%);aspect-ratio:1/1;display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:0 auto
}
.ttt-cell{
  border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.03);display:grid;place-items:center;aspect-ratio:1/1;font-size:42px;user-select:none
}
.ttt-cell:hover{background:rgba(255,255,255,.06)}
.ttt-cell.win{border-color:rgba(255,255,255,.28);background:rgba(255,255,255,.08);animation:pulse .6s ease-in-out infinite alternate}
@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.02)}}
.ttt-cell img{width:56%;height:56%;object-fit:contain}
.ttt-footer{display:flex;justify-content:space-between;gap:10px;align-items:center;flex-wrap:wrap}
.news-list{display:grid;gap:10px;margin:0;padding-left:18px}
.news-list li{line-height:1.5;color:var(--text)}
.small-note{font-size:12px;color:var(--muted)}
.persona-makalina .bot-body,.persona-makalina .user-bubble,.persona-makalina textarea,.persona-makalina input,.persona-makalina select,.persona-makalina .btn{font-weight:350}

@media (max-width: 1100px){
  .app{grid-template-columns:240px 1fr}
  .buy-layout{grid-template-columns:1fr}
}
@media (max-width: 820px){
  .app{width:calc(100vw - 8px);height:calc(100vh - 8px);grid-template-columns:1fr;grid-template-rows:auto 1fr}
  .sidebar{max-height:32vh}
  .clock{display:none}
  .right-tools select{max-width:150px}
  .bot-card,.user-bubble{max-width:92%}
  .buy-hero img{height:180px}
}
</style>
</head>
<body class="theme-pink">
<div class="app" id="app">
  <aside class="sidebar">
    <div class="sidebar-head">
      <div class="sidebar-title">Conversations</div>
      <button id="newConvBtn" class="btn icon" title="New conversation"><span class="icon-plus">+</span></button>
    </div>

    <div id="convList" class="conv-list"></div>

    <div class="sidebar-footer">
      <div class="stack">
        <button id="tttBtn" class="btn hidden">tic-tac-toe</button>
        <button id="newsBtn" class="btn">News</button>
      </div>
    </div>
  </aside>

  <main class="panel persona-makala" id="panelRoot">
    <div class="topbar">
      <div class="brand">
        <img src="makala.png" alt="makala">
        <h1 id="activeTitle">makala.ai</h1>
      </div>

      <div class="clock" id="clockText">--:-- --, --</div>

      <div class="right-tools">
        <select id="themeSelect">
          <option value="pink">purple & pink</option>
          <option value="deep">deep black</option>
          <option value="blue">navy blue</option>
          <option value="red">dark red</option>
          <option value="green">dark green</option>
          <option value="teal">teal night</option>
          <option value="orange">dark orange</option>
          <option value="indigo">indigo dusk</option>
          <option value="gold">gold dusk</option>
          <option value="slate">slate</option>
          <option value="violet">violet haze</option>
        </select>

        <select id="personaSelect">
          <option value="makala">makala</option>
          <option value="just chatgpt bro">just chatgpt bro</option>
          <option value="makalina">makalina</option>
        </select>

        <button id="clearBtn" class="btn">clear chats</button>
      </div>
    </div>

    <div id="chatRoot" class="chat">
      <div id="emptyState" class="empty-state">
        <div class="empty-card">
          <h2>Ready when you are</h2>
          <p>Start a conversation from one prompt. Simple, fast, and focused.</p>
          <textarea id="homeInput" class="home-input" placeholder="Ask me anything..." aria-label="Start chat"></textarea>
          <div class="suggestions">
            <button class="suggestion" data-prompt="teach me how to make the best Indian curry">teach me how to make the best Indian curry</button>
            <button class="suggestion" data-prompt="help me study for math">help me study for math</button>
            <button class="suggestion" data-prompt="give me a fun project idea">give me a fun project idea</button>
            <button class="suggestion" data-prompt="help me write a short story">help me write a short story</button>
          </div>
          <div style="display:flex;justify-content:center;flex-wrap:wrap">
            <button id="homeStartBtn" class="btn primary send-btn home-send-btn" aria-label="Start chat">
              <img src="send-circle.png" alt="" style="width:18px;height:18px;display:block">
            </button>
          </div>
        </div>
      </div>

      <div id="messageWrap" class="message-wrap hidden" aria-live="polite"></div>

      <div id="composer" class="composer hidden">
        <div class="composer-row">
          <textarea id="messageInput" placeholder="Ask me anything..." aria-label="Message"></textarea>
          <button id="sendBtn" class="btn primary send-btn"><img src="send-circle.png" alt="" style="width:18px;height:18px;display:block">send</button>
        </div>
      </div>
    </div>
  </main>
</div>

<div id="modalRoot"></div>

<script>
const $ = (s, root=document) => root.querySelector(s);
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
const trimLines = s => String(s ?? '').replace(/\r/g, '').replace(/\n+$/,'');
const STORAGE_KEY = 'makala_conversations_simple_v4';

marked.setOptions({ gfm: true, breaks: true });

const state = {
  conversations: [],
  activeId: null,
  theme: localStorage.getItem('makala_theme') || 'pink',
  makalinaOwned: localStorage.getItem('makala_owned') === '1',
  userName: localStorage.getItem('makala_user_name') || '',
  favNumber: localStorage.getItem('makala_fav_number') || '',
  pfpData: localStorage.getItem('makala_pfp_data') || ''
};

const els = {
  convList: $('#convList'),
  newConvBtn: $('#newConvBtn'),
  themeSelect: $('#themeSelect'),
  personaSelect: $('#personaSelect'),
  clearBtn: $('#clearBtn'),
  activeTitle: $('#activeTitle'),
  emptyState: $('#emptyState'),
  messageWrap: $('#messageWrap'),
  composer: $('#composer'),
  messageInput: $('#messageInput'),
  homeInput: $('#homeInput'),
  homeStartBtn: $('#homeStartBtn'),
  modalRoot: $('#modalRoot'),
  panelRoot: $('#panelRoot'),
  newsBtn: $('#newsBtn'),
  tttBtn: $('#tttBtn'),
  clockText: $('#clockText'),
};

function setTheme(theme){
  state.theme = theme;
  document.body.className = `theme-${theme}`;
  els.themeSelect.value = theme;
  localStorage.setItem('makala_theme', theme);
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify({
    conversations: state.conversations,
    activeId: state.activeId
  }));
  localStorage.setItem('makala_theme', state.theme);
  localStorage.setItem('makala_owned', state.makalinaOwned ? '1' : '0');
  localStorage.setItem('makala_user_name', state.userName || '');
  localStorage.setItem('makala_fav_number', state.favNumber || '');
  localStorage.setItem('makala_pfp_data', state.pfpData || '');
}

function loadState(){
  try{
    const raw = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    state.conversations = Array.isArray(raw.conversations) ? raw.conversations : [];
    state.activeId = raw.activeId || null;
  }catch{
    state.conversations = [];
    state.activeId = null;
  }
  if(state.activeId && !state.conversations.some(c => c.id === state.activeId)){
    state.activeId = null;
  }
}

function createConversation(title='New conversation', persona='makala'){
  const conv = {
    id: uid(),
    title,
    persona,
    createdAt: Date.now(),
    messages: []
  };
  state.conversations.unshift(conv);
  return conv;
}

function activeConversation(){
  return state.conversations.find(c => c.id === state.activeId) || null;
}

function escapeHTML(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[m]));
}

function relativeTime(ts){
  const now = Date.now();
  const diff = Math.max(0, now - ts);
  const mins = Math.floor(diff / 60000);
  if(mins < 1) return 'Just now';
  if(mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if(hrs < 24) return `${hrs}h ago`;
  const days = Math.floor(hrs / 24);
  if(days === 1) return 'Yesterday';
  if(days < 7) return `${days}d ago`;
  if(days < 30) return `${Math.floor(days / 7)}w ago`;
  return 'A while ago';
}

function personaAvatar(persona){
  return persona === 'makalina' ? 'linalogo.png' : 'makala.png';
}

function loadingAvatar(persona){
  return persona === 'makalina' ? 'linastar.png' : 'makala.png';
}

function buildSystemPrompt(persona){
  if(persona === 'makalina'){
    return [
      'You are Makalina, a more matured version of Makala.',
      'You still have a slightly Indian personality, but you sound a bit more professional than Makala.',
      'You may use slang sometimes, but less often than Makala.',
      'You are very good at math because your parents forced you to practice math instead of sleeping, and you are eternally grateful.',
      'Keep replies concise, polished, and natural.'
    ].join(' ');
  }
  if(persona === 'just chatgpt bro'){
    return [
      'You are a helpful conversational assistant.',
      'Speak clearly, naturally, and helpfully.',
      'Keep answers concise unless the user asks for details.'
    ].join(' ');
  }
  return [
    'You are Makala.',
    'Speak casual internet slang, playful tone, lowercase vibe, short replies.',
    'Use words like lol, fr, bro, beta naturally.',
    'Be friendly, informal, and energetic.'

}

function smartTitle(text){
  const cleaned = trimLines(text).replace(/\s+/g,' ').replace(/^[^\w]+|[^\w]+$/g,'');
  if(!cleaned) return 'New conversation';
  const parts = cleaned.split(' ').slice(0,5);
  let title = parts.join(' ');
  title = title.charAt(0).toUpperCase() + title.slice(1);
  return title.length > 60 ? title.slice(0,57) + '…' : title;
}

function renderConvList(){
  els.convList.innerHTML = '';

  const home = document.createElement('div');

  home.innerHTML = `
    <div class="home-icon">⌂</div>
    <div class="conv-copy">

      <div class="conv-meta">Start a new chat</div>
    </div>
  `;
  home.addEventListener('click', () => {
    state.activeId = null;
    saveState();
    renderAll();
  });
  els.convList.appendChild(home);

  state.conversations.forEach(conv => {
    const item = document.createElement('div');
    item.className = 'conv-item' + (conv.id === state.activeId ? ' active' : '');

    const icon = document.createElement('img');
    icon.src = personaAvatar(conv.persona);
    icon.alt = '';
    icon.className = 'conv-icon';

    const copy = document.createElement('div');
    copy.className = 'conv-copy';
    copy.innerHTML = `
      <div class="conv-title">${escapeHTML(conv.title || 'New conversation')}</div>
      <div class="conv-meta">${escapeHTML(relativeTime(conv.createdAt || Date.now()))}</div>
    `;

    del.className = 'conv-trash';
    del.type = 'button';
    del.title = 'Delete conversation';
    del.innerHTML = `<img src="trash.png" alt="delete" style="width:18px;height:18px;display:block">`;

    item.append(icon, copy, del);
    item.addEventListener('click', (e) => {
      if(e.target.closest('.conv-trash')){
        deleteConversation(conv.id);
        return;
      }
      state.activeId = conv.id;
      saveState();
      renderAll();
    });

    els.convList.appendChild(item);
  });
}

function renderMarkdown(text){
  const raw = marked.parse(trimLines(text || ''));
  return DOMPurify.sanitize(raw);
}

function addCodeCopyButtons(root){
  root.querySelectorAll('pre').forEach(pre => {
    if(pre.querySelector('.copy-code')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-code';
    btn.type = 'button';
    btn.title = 'Copy code';
    btn.innerHTML = `<img src="copy.png" alt="">`;
    btn.addEventListener('click', async () => {
      const code = pre.querySelector('code');
      if(!code) return;
      try{
        await navigator.clipboard.writeText(code.textContent || '');
        btn.style.opacity = '0.7';
        setTimeout(() => btn.style.opacity = '1', 180);
      }catch{}
    });
    pre.appendChild(btn);
  });
}

function makeTypingRow(persona){
  const row = document.createElement('div');
  row.className = 'message-row bot fade-in';

  const shell = document.createElement('div');
  shell.className = 'typing-shell';

  const avatar = document.createElement('img');
  avatar.className = 'typing-avatar spin';
  avatar.src = loadingAvatar(persona);
  avatar.alt = '';

  const text = document.createElement('div');
  text.className = 'typing-text';
  text.innerHTML = `<span class="typing-dots"><span></span><span></span><span></span></span>`;

  shell.append(avatar, text);
  row.appendChild(shell);
  return row;
}

function renderMessageNode(msg, conv, animate=false){
  if(msg.role === 'user'){
    const row = document.createElement('div');
    row.className = 'message-row user' + (animate ? ' fade-in' : '');

    const bubble = document.createElement('div');
    bubble.className = 'user-bubble';
    bubble.innerHTML = renderMarkdown(msg.content);

    row.appendChild(bubble);
    return row;
  }

  const row = document.createElement('div');
  row.className = 'message-row bot' + (animate ? ' fade-in' : '');

  const card = document.createElement('div');
  card.className = 'bot-card';

  const avatar = document.createElement('img');
  avatar.className = 'bot-avatar';
  avatar.src = personaAvatar(conv.persona);
  avatar.alt = '';

  const body = document.createElement('div');
  body.className = 'bot-body';
  body.innerHTML = renderMarkdown(msg.content);
  addCodeCopyButtons(body);

  card.append(avatar, body);
  row.appendChild(card);
  return row;
}

function autoGrow(textarea){
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 150) + 'px';
}

function showHome(){
  state.activeId = null;
  saveState();
  renderAll();
}

function deleteConversation(id){
  state.conversations = state.conversations.filter(c => c.id !== id);
  if(state.activeId === id) state.activeId = null;
  saveState();
  renderAll();
}

function openModal(innerHTML){
  els.modalRoot.innerHTML = `
    <div class="modal-backdrop">
      <div class="modal show">${innerHTML}</div>
    </div>
  `;
  const close = () => { els.modalRoot.innerHTML = ''; };
  els.modalRoot.querySelector('[data-close]')?.addEventListener('click', close);
  els.modalRoot.querySelector('.modal-backdrop')?.addEventListener('click', (e) => {
    if(e.target.classList.contains('modal-backdrop')) close();
  });
  return close;
}

async function fileToDataURL(file){
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = e => resolve(String(e.target.result || ''));
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

function openTicTacToe(){
  if(!state.makalinaOwned){
    openBuyMakalina();
    return;
  }

  const close = openModal(`
    <div class="modal-head">
      <h3>tic-tac-toe</h3>
      <button class="btn compact" data-close>×</button>
    </div>
    <div class="modal-body">
      <div class="ttt-wrap">
        <div class="ttt-top">
          <div class="small-note">you are O. makalina is X.</div>
          <button id="tttRestart" class="btn compact">New game</button>
        </div>
        <div id="tttBoard" class="ttt-board"></div>
        <div class="ttt-footer">
          <div class="small-note" id="tttStatus">your move</div>
          <div class="small-note">winner gets coins</div>
        </div>
      </div>
    </div>
  `);

  const board = $('#tttBoard');
  const status = $('#tttStatus');
  let cells = Array(9).fill('');
  let finished = false;
  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function drawBoard(){
    board.innerHTML = '';
    cells.forEach((v,i) => {
      const cell = document.createElement('button');
      cell.className = 'ttt-cell';
      cell.type = 'button';

      if(v === 'O'){
        cell.textContent = 'O';
      }else if(v === 'X'){
        const img = document.createElement('img');
        img.src = 'linastar.png';
        img.alt = 'X';
        cell.appendChild(img);
      }

      cell.addEventListener('click', () => handleCell(i));
      board.appendChild(cell);
    });
  }

  function checkWin(sym){
    return wins.find(line => line.every(idx => cells[idx] === sym)) || null;
  }

  function finish(sym, line){
    finished = true;
    if(line) line.forEach(idx => board.children[idx].classList.add('win'));
    const amount = Math.floor(Math.random()*101) + 50;
    status.textContent = sym === 'O' ? `you won ${amount} makala's coins` : sym === 'X' ? `makalina won ${amount} coins` : 'draw';
  }

  function aiMove(){
    if(finished) return;
    const free = cells.map((v,i) => v ? null : i).filter(v => v !== null);
    if(!free.length){ finish(null); return; }
    const pick = free[Math.floor(Math.random()*free.length)];
    cells[pick] = 'X';
    drawBoard();
    const win = checkWin('X');
    if(win){ finish('X', win); return; }
    if(cells.every(Boolean)){ finish(null); return; }
    status.textContent = 'your move';
  }

  function handleCell(i){
    if(finished || cells[i]) return;
    cells[i] = 'O';
    drawBoard();
    const win = checkWin('O');
    if(win){ finish('O', win); return; }
    if(cells.every(Boolean)){ finish(null); return; }
    status.textContent = 'makalina is thinking...';
    setTimeout(aiMove, 400);
  }

  $('#tttRestart').addEventListener('click', () => {
    cells = Array(9).fill('');
    finished = false;
    status.textContent = 'your move';
    drawBoard();
  });

  drawBoard();
}

function sendToServer(payload){
  return fetch('/api/chat', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(payload)
  });
}

function ensureActiveConversation(){
  let conv = activeConversation();
  if(!conv){
    conv = createConversation('New conversation', els.personaSelect.value || 'makala');
    state.activeId = conv.id;
    saveState();
  }
  return conv;
}

async function sendMessage(rawText){
  const text = trimLines(rawText).trim();
  if(!text) return;

  const conv = ensureActiveConversation();
  const persona = conv.persona || 'makala';

  if(conv.messages.length === 0 && conv.title === 'New conversation'){
    conv.title = smartTitle(text);
    els.activeTitle.textContent = conv.title;
  }

  conv.messages.push({ role:'user', content:text, createdAt: Date.now() });
  saveState();
  renderAll();

  const typing = makeTypingRow(persona);
  els.messageWrap.appendChild(typing);
  els.messageWrap.scrollTop = els.messageWrap.scrollHeight;

  try{
    const messages = [
      { role:'system', content: buildSystemPrompt(persona) },
      ...conv.messages.map(m => ({ role:m.role, content:m.content }))
    ];

    const resp = await sendToServer({ messages });
    let data = {};
    try{ data = await resp.json(); }catch{ data = {}; }

    const reply = (data && typeof data.reply === 'string' && data.reply.trim()) ? data.reply : 'No response.';
    conv.messages.push({ role:'assistant', content:reply, createdAt: Date.now() });
    saveState();

    typing.remove();
    els.messageWrap.appendChild(renderMessageNode({role:'assistant', content:reply}, conv, true));
    els.messageWrap.scrollTop = els.messageWrap.scrollHeight;
    renderConvList();
  }catch(err){
    typing.remove();
    const reply = `Error: ${String(err?.message || err)}`;
    conv.messages.push({ role:'assistant', content:reply, createdAt: Date.now() });
    saveState();
    els.messageWrap.appendChild(renderMessageNode({role:'assistant', content:reply}, conv, true));
    els.messageWrap.scrollTop = els.messageWrap.scrollHeight;
    renderConvList();
  }

  els.messageInput.value = '';
  autoGrow(els.messageInput);
  els.homeInput.value = '';
  autoGrow(els.homeInput);
}

function renderAll(){
  const conv = activeConversation();
  setTheme(state.theme);

  els.activeTitle.textContent = conv?.title || 'makala.ai';
  els.personaSelect.value = conv?.persona || 'makala';

  els.emptyState.classList.toggle('hidden', !!conv);
  els.messageWrap.classList.toggle('hidden', !conv);
  els.composer.classList.toggle('hidden', !conv);

  if(conv){
    els.messageWrap.innerHTML = '';
    conv.messages.forEach(msg => {
      els.messageWrap.appendChild(renderMessageNode(msg, conv, false));
    });
    els.messageWrap.scrollTop = els.messageWrap.scrollHeight;
  }else{
    els.homeInput.value = '';
    els.messageInput.value = '';
    autoGrow(els.homeInput);
    autoGrow(els.messageInput);
  }

  els.panelRoot.classList.toggle('persona-makalina', (conv?.persona || 'makala') === 'makalina');
  els.tttBtn.classList.toggle('hidden', !state.makalinaOwned);
  renderConvList();
  updateClock();

  window.requestAnimationFrame(() => {
    if(conv) els.messageInput.focus();
    else els.homeInput.focus();
  });
}

function updateClock(){
  const d = new Date();
  const time = d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  const day = d.toLocaleDateString([], { weekday: 'long' });
  els.clockText.textContent = `${time}, ${day}`;
}

function wireEvents(){
  els.newConvBtn.addEventListener('click', () => {
    const wanted = els.personaSelect.value || 'makala';
    if(wanted === 'makalina' && !state.makalinaOwned){
      openBuyMakalina();
      return;
    }
    const conv = createConversation('New conversation', wanted);
    state.activeId = conv.id;
    saveState();
    renderAll();
  });

  els.clearBtn.addEventListener('click', () => {
    if(!confirm('Clear all chats?')) return;
    state.conversations = [];
    state.activeId = null;
    saveState();
    renderAll();
  });

  els.themeSelect.addEventListener('change', () => {
    setTheme(els.themeSelect.value);
    saveState();
  });

  els.personaSelect.addEventListener('change', () => {
    const current = activeConversation();
    if(!current) return;

    const picked = els.personaSelect.value;
    if(picked === 'makalina' && !state.makalinaOwned){
      els.personaSelect.value = current.persona || 'makala';
      openBuyMakalina();
      return;
    }

    current.persona = picked;
    saveState();
    renderAll();
  });

  const submitFromHome = () => {
    const value = els.homeInput.value.trim();
    if(!value) return;
    const wanted = els.personaSelect.value || 'makala';
    if(wanted === 'makalina' && !state.makalinaOwned){
      openBuyMakalina();
      return;
    }
    const conv = createConversation('New conversation', wanted);
    state.activeId = conv.id;
    saveState();
    renderAll();
    els.homeInput.value = '';
    autoGrow(els.homeInput);
    sendMessage(value);
  };

  els.homeStartBtn.addEventListener('click', submitFromHome);
  els.homeInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      submitFromHome();
    }
  });

  els.messageInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter' && !e.shiftKey){
      e.preventDefault();
      const value = els.messageInput.value;
      sendMessage(value);
    }
  });

  els.sendBtn.addEventListener('click', () => {
    const value = els.messageInput.value;
    sendMessage(value);
  });

  els.homeInput.addEventListener('input', () => autoGrow(els.homeInput));
  els.messageInput.addEventListener('input', () => autoGrow(els.messageInput));

  document.querySelectorAll('.suggestion').forEach(btn => {
    btn.addEventListener('click', () => {
      const prompt = btn.dataset.prompt || btn.textContent || '';
      els.homeInput.value = prompt;
      autoGrow(els.homeInput);
      els.homeInput.focus();
    });
  });

  els.newsBtn.addEventListener('click', openNews);
  els.tttBtn.addEventListener('click', openTicTacToe);

  setInterval(updateClock, 1000);
}

function init(){
  loadState();
  setTheme(state.theme);
  wireEvents();
  renderAll();
  autoGrow(els.homeInput);
  autoGrow(els.messageInput);
  if(!state.activeId) renderAll();
}

init();
</script>
